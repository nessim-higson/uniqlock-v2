<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAAH — curate the archive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c0c; color: #fff; font-family: "Helvetica Neue", Helvetica, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: rgba(12,12,12,0.94);
    backdrop-filter: blur(8px); padding: 18px 28px; display: flex; align-items: baseline;
    gap: 28px; border-bottom: 1px solid #222; }
  header h1 { font-size: 13px; letter-spacing: 0.2em; font-weight: 700; }
  header .keys { font-size: 11px; opacity: 0.5; letter-spacing: 0.08em; }
  header .prog { font-size: 11px; letter-spacing: 0.12em; margin-left: auto;
    font-variant-numeric: tabular-nums; }
  header button { background: #fff; color: #111; border: 0; font: inherit; font-size: 11px;
    font-weight: 700; letter-spacing: 0.1em; padding: 8px 14px; cursor: pointer; }
  main { padding: 10px 28px 80px; }
  h2 { font-size: 12px; letter-spacing: 0.18em; font-weight: 700; opacity: 0.6;
    margin: 34px 0 12px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .cell { position: relative; aspect-ratio: 4/3; background: #1a1a1a; cursor: pointer;
    outline: 1px solid transparent; }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell.cur { outline: 2px solid #4af; z-index: 2; }
  .cell.bless { outline: 2px solid #fff; }
  .cell.kill img { opacity: 0.18; filter: grayscale(1); }
  .cell.kill::after { content: ''; position: absolute; left: 6%; right: 6%; top: 50%;
    height: 2px; background: #e33; transform: rotate(-8deg); }
  .badge { position: absolute; top: 6px; right: 6px; background: #fff; color: #111;
    font-size: 11px; font-weight: 700; width: 20px; height: 20px; display: none;
    align-items: center; justify-content: center; }
  .cell.bless .badge { display: flex; }
</style>
</head>
<body>

<header>
  <h1>CURATE — 171 WORKS</h1>
  <div class="keys">hover/arrows to target · B bless · K kill · 1/2/3 rank · U undo · click cycles</div>
  <div class="prog" id="prog"></div>
  <button id="export">EXPORT</button>
</header>
<main id="main"></main>

<script>
const THUMB = '?fit=max&w=480&q=70&fm=jpg';
const LS_KEY = 'iaah-curation-v1';

let entries = [];
let state = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); // file -> {s, r}
let order = [];   // flat list of files in render order
let cur = -1;

function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function stateOf(file) { return state[file] || { s: 'undecided', r: 0 }; }

function applyCell(cell, file) {
  const st = stateOf(file);
  cell.classList.toggle('bless', st.s === 'bless');
  cell.classList.toggle('kill', st.s === 'kill');
  cell.querySelector('.badge').textContent = st.r || '';
}

function progress() {
  const decided = entries.filter((e) => stateOf(e.file).s !== 'undecided').length;
  const blessed = entries.filter((e) => stateOf(e.file).s === 'bless').length;
  document.getElementById('prog').textContent =
    `${decided}/${entries.length} decided · ${blessed} blessed`;
}

function set(file, s, r) {
  state[file] = { s, r: s === 'bless' ? (r || stateOf(file).r || 2) : 0 };
  save();
  const cell = document.querySelector(`[data-file="${CSS.escape(file)}"]`);
  if (cell) applyCell(cell, file);
  progress();
}

function setCur(i) {
  if (cur >= 0) {
    const prev = document.querySelector(`[data-file="${CSS.escape(order[cur])}"]`);
    if (prev) prev.classList.remove('cur');
  }
  cur = Math.max(0, Math.min(order.length - 1, i));
  const cell = document.querySelector(`[data-file="${CSS.escape(order[cur])}"]`);
  if (cell) {
    cell.classList.add('cur');
    cell.scrollIntoView({ block: 'nearest' });
  }
}

fetch('archive.json').then((r) => r.json()).then((data) => {
  entries = data;
  const groups = {};
  for (const e of entries) (groups[e.project] = groups[e.project] || []).push(e);
  const main = document.getElementById('main');
  const sorted = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
  for (const [project, items] of sorted) {
    const h = document.createElement('h2');
    h.textContent = `${project} — ${items.length}`;
    main.appendChild(h);
    const grid = document.createElement('div');
    grid.className = 'grid';
    for (const e of items) {
      order.push(e.file);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.file = e.file;
      cell.innerHTML = `<img loading="lazy" src="${e.url}${THUMB}"><div class="badge"></div>`;
      cell.addEventListener('mouseenter', () => setCur(order.indexOf(e.file)));
      cell.addEventListener('click', () => {
        const s = stateOf(e.file).s;
        set(e.file, s === 'undecided' ? 'bless' : s === 'bless' ? 'kill' : 'undecided');
      });
      grid.appendChild(cell);
      applyCell(cell, e.file);
    }
    main.appendChild(grid);
  }
  progress();
  setCur(0);
});

document.addEventListener('keydown', (e) => {
  if (cur < 0) return;
  const file = order[cur];
  const cols = Math.max(1, Math.floor(document.querySelector('.grid').clientWidth / 158));
  if (e.key === 'ArrowRight') { setCur(cur + 1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { setCur(cur - 1); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { setCur(cur + cols); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { setCur(cur - cols); e.preventDefault(); }
  else if (e.key === 'b' || e.key === 'B') { set(file, 'bless'); setCur(cur + 1); }
  else if (e.key === 'k' || e.key === 'K') { set(file, 'kill'); setCur(cur + 1); }
  else if (e.key === 'u' || e.key === 'U') { set(file, 'undecided'); }
  else if (['1', '2', '3'].includes(e.key)) { set(file, 'bless', Number(e.key)); setCur(cur + 1); }
});

document.getElementById('export').addEventListener('click', () => {
  const out = {
    version: 1,
    exported: new Date().toISOString(),
    items: entries.map((e) => ({
      file: e.file, project: e.project, url: e.url, ...stateOf(e.file),
    })),
  };
  const blob = new Blob([JSON.stringify(out, null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'iaah-curation.json';
  a.click();
});
</script>

</body>
</html>
