<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 05 — beat-cut grid</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  :root { --ease-out: cubic-bezier(.1, 1, .2, 1); }

  #stage { position: absolute; inset: 0; perspective: 1200px; }

  .panel { position: absolute; overflow: hidden; container-type: size; }
  .panel img, .panel video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .panel.in-top    { animation: inTop 300ms forwards var(--ease-out); }
  .panel.in-right  { animation: inRight 300ms forwards var(--ease-out); }
  .panel.in-bottom { animation: inBottom 300ms forwards var(--ease-out); }
  .panel.in-left   { animation: inLeft 300ms forwards var(--ease-out); }
  .panel.out-top    { animation: outTop 300ms forwards var(--ease-out); }
  .panel.out-right  { animation: outRight 300ms forwards var(--ease-out); }
  .panel.out-bottom { animation: outBottom 300ms forwards var(--ease-out); }
  .panel.out-left   { animation: outLeft 300ms forwards var(--ease-out); }
  .panel.recede {
    transition: transform 700ms var(--ease-out), opacity 700ms var(--ease-out);
    transform: translateZ(-300px);
    opacity: 0;
  }

  @keyframes inTop    { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
  @keyframes inRight  { from { clip-path: inset(0 0 0 100%); } to { clip-path: inset(0); } }
  @keyframes inBottom { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0); } }
  @keyframes inLeft   { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }
  @keyframes outTop    { from { clip-path: inset(0); } to { clip-path: inset(100% 0 0 0); } }
  @keyframes outRight  { from { clip-path: inset(0); } to { clip-path: inset(0 100% 0 0); } }
  @keyframes outBottom { from { clip-path: inset(0); } to { clip-path: inset(0 0 100% 0); } }
  @keyframes outLeft   { from { clip-path: inset(0); } to { clip-path: inset(0 0 0 100%); } }

  .clockface { width: 100%; height: 100%; display: flex; align-items: center;
    justify-content: center; font-family: "Uniqlo", "Helvetica Neue", sans-serif;
    font-weight: 700; }
  .clockface .t { font-size: 9cqmin; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }

  #metro { position: fixed; left: 22px; top: 22px; width: 6vmin; height: 6vmin;
    z-index: 4; background: #fff; display: flex;
    align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-family: "Helvetica Neue", Helvetica, sans-serif;
    font-weight: 700; font-size: 1.6vmin; letter-spacing: 0.04em; color: #111; }

  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="stage"></div>
<div id="metro" style="display:none"><span>IAAH</span></div>
<video id="v0" muted playsinline preload="auto" style="display:none"></video>
<video id="v1" muted playsinline preload="auto" style="display:none"></video>
<div id="label">COMP 05 — BEAT-CUT GRID · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">BEAT-CUT GRID</div>
  <div class="prompt">the archive composes itself on the metronome — aspect-true panels
  butting<br>against each other, receding into depth, the clock visiting. every move
  on the beat.</div>
  <div class="prompt">1 / 2 / 3 — density · m mute · click to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { VIDEOS, HOUR_COLORS, timeOfDay, loadImageryManifest } from '../../js/data.js';

const stage = document.getElementById('stage');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const vids = [document.getElementById('v0'), document.getElementById('v1')];

const conductor = createConductor();
const music = createMusic(conductor);

// all durations in WHOLE beats — every entrance and exit lands on a tick
const DENSITY = {
  1: { durs: [2, 2, 4, 4, 6], name: 'HALF-TIME' },
  2: { durs: [1, 1, 2, 2, 3], name: 'ON THE BEAT' },
  3: { durs: [1, 1, 1, 2], name: 'DOUBLE-TIME' },
};
let density = 2;

// ── pools: stills preloaded ahead so their native aspect is known at
//    composition time — panels are sized BY the image, never cropping it ──
let stillPool = [], stillQueue = [];
const staged = [];

function shuffled(list) {
  const a = [...list];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function nextStillUrl() {
  if (!stillQueue.length) stillQueue = shuffled(stillPool);
  return stillQueue.pop();
}

function ensureStaged() {
  while (staged.length < 8 && stillPool.length) {
    const img = new Image();
    const entry = { img, aspect: 4 / 3, ready: false };
    img.onload = () => {
      entry.aspect = img.naturalWidth / img.naturalHeight;
      entry.ready = true;
    };
    img.onerror = () => { entry.ready = true; };
    img.src = nextStillUrl();
    staged.push(entry);
  }
}
function takeStill() {
  const i = staged.findIndex((e) => e.ready);
  const entry = i >= 0 ? staged.splice(i, 1)[0] : staged.shift();
  ensureStaged();
  return entry;
}

let clipQueue = [];
function nextClipUrl() {
  if (!clipQueue.length) clipQueue = shuffled(VIDEOS[timeOfDay(new Date().getHours())]);
  return clipQueue.pop();
}
let vidStandby = 0;
let vidBusy = [false, false];
function preloadStandby() {
  if (vidBusy[vidStandby]) return;
  const v = vids[vidStandby];
  v.src = nextClipUrl();
  v.load();
}
function claimVideo() {
  const i = vidStandby;
  if (vidBusy[i] || vids[i].readyState < 2) return null;
  vidBusy[i] = true;
  vidStandby = 1 - vidStandby;
  preloadStandby();
  return vids[i];
}
function releaseVideo(v) {
  const i = vids.indexOf(v);
  if (i >= 0) { v.pause(); vidBusy[i] = false; }
}

// ── the composer: aspect-true panels that BUTT against each other.
//    first panel anchors; the rest sit flush on a shared edge, tops and
//    bottoms deliberately misaligned. black is negative space. ──
function composeSlot(wantClip) {
  const VW = innerWidth, VH = innerHeight;
  const n = [1, 1, 2, 2, 2, 3][Math.floor(Math.random() * 6)];
  const specs = [];
  let prev = null;

  for (let i = 0; i < n; i++) {
    let content = null, aspect;
    if (wantClip && i === 0) {
      const v = claimVideo();
      if (v) {
        content = { kind: 'clip', el: v };
        aspect = (v.videoWidth && v.videoHeight) ? v.videoWidth / v.videoHeight : 4 / 3;
      }
    }
    if (!content) {
      const s = takeStill();
      if (!s) break;
      content = { kind: 'still', el: s.img };
      aspect = s.aspect;
    }

    let h = VH * [0.5, 0.62, 0.8, 1][Math.floor(Math.random() * 4)];
    let w = h * aspect;
    if (w > VW) { h *= VW / w; w = VW; }

    let xPos, yPos;
    if (!prev) {
      xPos = [0, (VW - w) / 2, VW - w, VW * 0.08, VW * 0.55][Math.floor(Math.random() * 5)];
      xPos = Math.max(0, Math.min(VW - w, xPos));
      yPos = [0, (VH - h) / 2, VH - h][Math.floor(Math.random() * 3)];
    } else {
      // butt against the previous panel: flush seam, offset alignment
      if (prev.x + prev.w + w <= VW + w * 0.15) xPos = prev.x + prev.w;
      else xPos = prev.x - w;
      const yOpts = [prev.y, prev.y + prev.h - h, prev.y + prev.h / 2 - h / 2];
      yPos = yOpts[Math.floor(Math.random() * 3)];
    }
    xPos = Math.max(-w * 0.12, Math.min(VW - w * 0.88, xPos));
    yPos = Math.max(-h * 0.12, Math.min(VH - h * 0.88, yPos));

    const spec = { x: xPos, y: yPos, w, h, content };
    specs.push(spec);
    prev = spec;
    // a near-full-width anchor owns the frame — companions would only
    // bleed offscreen
    if (i === 0 && w > VW * 0.82) break;
  }
  return specs;
}

// ── panels ──
const livePanels = new Set();
const liveClockFaces = new Set();
const DIRECTIONS = ['top', 'right', 'bottom', 'left'];
let dirCount = 0;
function nextDir() { return DIRECTIONS[dirCount++ % 4]; }

function showPanel(spec) {
  const d = document.createElement('div');
  d.className = 'panel';
  d.style.left = spec.x + 'px';
  d.style.top = spec.y + 'px';
  d.style.width = spec.w + 'px';
  d.style.height = spec.h + 'px';
  d.dataset.slot = spec.slot;
  spec.el = d;

  if (spec.content.kind === 'clock') {
    fillClock(d);
  } else if (spec.content.kind === 'clip') {
    const v = spec.content.el;
    v.style.display = 'block';
    v.currentTime = 0;
    v.play().catch(() => {});
    d.appendChild(v);
  } else {
    const im = spec.content.el.cloneNode();
    d.appendChild(im);
  }

  if (spec.mode === 'wipe') d.classList.add('in-' + nextDir());
  stage.appendChild(d);
  livePanels.add(d);
}

function removePanel(d) {
  if (!d || !d.isConnected) return;
  const v = d.querySelector('video');
  if (v) { releaseVideo(v); v.style.display = 'none'; document.body.appendChild(v); }
  const face = d.querySelector('.clockface');
  if (face) liveClockFaces.delete(face);
  d.remove();
  livePanels.delete(d);
}

function hidePanel(spec) {
  const d = spec.el;
  if (!d || !d.isConnected) return;
  if (spec.exit === 'recede') {
    // shift back in Z — the next composition arrives in front of it
    d.classList.add('recede');
    setTimeout(() => removePanel(d), 750);
  } else if (spec.exit === 'wipe') {
    d.className = 'panel out-' + nextDir();
    let done = false;
    const fin = () => { if (!done) { done = true; removePanel(d); } };
    d.addEventListener('animationend', fin, { once: true });
    setTimeout(fin, 400);
  } else {
    removePanel(d);
  }
}

// ── the clock interstitial ──
function fillClock(d) {
  const face = document.createElement('div');
  face.className = 'clockface';
  const t = document.createElement('div');
  t.className = 't';
  face.appendChild(t);
  d.appendChild(face);
  liveClockFaces.add(face);
  paintClock(face, new Date());
}
function paintClock(face, date) {
  const [r, g, b] = HOUR_COLORS[date.getHours()];
  const invert = date.getSeconds() % 2 === 1;
  face.style.background = invert ? '#fff' : `rgb(${r},${g},${b})`;
  face.style.color = invert ? `rgb(${r},${g},${b})` : '#fff';
  face.querySelector('.t').textContent = date.toTimeString().slice(0, 8);
}

// ── slot engine: phase-space events, everything on whole beats ──
let events = [];
function at(phase, prio, fn) {
  events.push({ phase, prio, fn });
  events.sort((a, b) => a.phase - b.phase || a.prio - b.prio);
}

let slotCount = 0;
let nextClockIn = 5 + Math.floor(Math.random() * 4);

function sweepStale() {
  for (const d of [...livePanels]) {
    if (slotCount - Number(d.dataset.slot || 0) >= 2) removePanel(d);
  }
}

function runSlot(P) {
  slotCount++;
  sweepStale();
  const isClock = --nextClockIn <= 0;
  if (isClock) nextClockIn = 5 + Math.floor(Math.random() * 4);

  const durs = DENSITY[density].durs;
  const D = isClock ? 2 : durs[Math.floor(Math.random() * durs.length)];

  let specs;
  if (isClock) {
    // the clock visits like any other panel: small, placed, varied —
    // full-bleed only as a rare exclamation
    const VW = innerWidth, VH = innerHeight;
    const m = Math.min(VW, VH);
    const side = Math.random() < 0.12 ? m : m * [0.3, 0.42, 0.55][Math.floor(Math.random() * 3)];
    const xs = [VW * 0.06, (VW - side) / 2, VW - side - VW * 0.06];
    const ys = [VH * 0.08, (VH - side) / 2, VH - side - VH * 0.08];
    specs = [{
      x: xs[Math.floor(Math.random() * 3)],
      y: ys[Math.floor(Math.random() * 3)],
      w: side, h: side,
      content: { kind: 'clock' },
    }];
  } else {
    specs = composeSlot(Math.random() < 0.3);
  }

  specs.forEach((spec, i) => {
    spec.slot = slotCount;
    // one grammar for every panel: mask in on the beat, recede into Z
    // as the next composition replaces it
    spec.mode = 'wipe';
    spec.exit = 'recede';
    // entrances on whole beats only: anchor on the slot beat, others may
    // join exactly one beat later (when the slot is long enough)
    const enter = (i > 0 && D >= 2 && Math.random() < 0.5) ? 1 : 0;
    at(P + enter, 1, () => showPanel(spec));
    at(P + D, 0, () => hidePanel(spec));
  });

  at(P + D, 2, () => runSlot(P + D));
}

function processEvents(p) {
  while (events.length && p >= events[0].phase) {
    const e = events.shift();
    if (p - e.phase > 2 && e.prio !== 2) continue;
    e.fn();
  }
}

function render() {
  processEvents(conductor.phase());
  requestAnimationFrame(render);
}

// ── the metronome made visible: the IAAH box turns on every beat ──
let metroDeg = 0;
conductor.onBeat((beat) => {
  music.onBeat(beat);
  if (document.hidden && entered) processEvents(conductor.phase());
  metroDeg += 90;
  metro.style.transform = `rotate(${metroDeg}deg)`;
  for (const face of liveClockFaces) paintClock(face, beat.date);
  statusEl.textContent = `${DENSITY[density].name} · SLOT ${String(slotCount).padStart(3, '0')} · ${beat.date.toTimeString().slice(0, 8)}`;
});

// ── entry: visuals immediately, music joins when ready ──
let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    stillPool = await manifestReady;
    ensureStaged();
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    metro.style.display = 'flex';
    preloadStandby();
    runSlot(Math.ceil(conductor.phase() + 0.3));
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch((err) => {
      console.warn('[beatcut] music failed, running silent:', err);
      statusEl.textContent = 'music failed — running silent';
    });
  } catch (err) {
    console.error(err);
    entered = false;
    const prompt = overlay.querySelector('.prompt');
    if (prompt) prompt.textContent = `failed to start: ${err.message} — click to retry`;
  }
});

document.addEventListener('keydown', (e) => {
  if (!entered) return;
  if (e.key === 'm') music.toggleMute();
  if (DENSITY[e.key]) density = Number(e.key);
});
</script>

</body>
</html>
