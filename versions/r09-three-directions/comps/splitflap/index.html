<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 07 — split-flap archive</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }

  #board { position: absolute; inset: 0; }
  .cell { position: absolute; perspective: 700px; }
  .half { position: absolute; left: 0; width: 100%; height: 50%; overflow: hidden;
    background: #0a0a0a; }
  .half.top { top: 0; }
  .half.bottom { bottom: 0; }
  .img { position: absolute; left: 0; width: 100%; height: 200%;
    background-repeat: no-repeat; }
  .half.top .img { top: 0; }
  .half.bottom .img { top: -100%; }
  .flap { position: absolute; left: 0; top: 0; width: 100%; height: 50%;
    transform-origin: bottom center; transform-style: preserve-3d; z-index: 2; }
  .face { position: absolute; inset: 0; overflow: hidden;
    backface-visibility: hidden; background: #0a0a0a; }
  .face.front .img { top: 0; }
  .face.back { transform: rotateX(180deg); }
  .face.back .img { top: -100%; }
  .cell.go .flap { transition: transform 175ms cubic-bezier(.55, 0, .7, .4);
    transform: rotateX(-180deg); }
  /* the hairline gap between halves — the machine shows its seams */
  .cell::after { content: ''; position: absolute; left: 0; right: 0; top: 50%;
    height: 1px; margin-top: -0.5px; background: rgba(0,0,0,0.55); z-index: 3; }

  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="board"></div>
<div id="label">COMP 07 — SPLIT-FLAP ARCHIVE · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">SPLIT-FLAP</div>
  <div class="prompt">the archive as a departure board — every image exists as mechanical
  flaps,<br>columns clatter left to right on the beat, the clock is just another
  destination.</div>
  <div class="prompt">m mute · click to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import { createConductor } from '../../js/conductor.js';
import { HOUR_COLORS, loadImageryManifest } from '../../js/data.js';

const board = document.getElementById('board');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');

const conductor = createConductor();
const { ctx } = conductor;

// broadcast determinism: cycle serial is a pure function of the clock.
// each cycle: 4 beats of hold, then the wave — half the columns flip on
// beat 5, the rest on beat 6.
const CYC = 6;

function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── sound: the clack ──
const master = ctx.createGain();
master.connect(ctx.destination);
let muted = false;
let noiseBuf = null;
function makeNoise() {
  noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}
function clackAt(when, gain = 0.05) {
  const src = ctx.createBufferSource();
  src.buffer = noiseBuf;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 1.2;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.05);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(when);
}
// quiet pad so the clacks live in a room
function startPad() {
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 380;
  const g = ctx.createGain(); g.gain.value = 0.016;
  lp.connect(g); g.connect(master);
  [[73.42, 0.6], [110, 0.35]].forEach(([f, amp]) => {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const og = ctx.createGain(); og.gain.value = amp;
    o.connect(og); og.connect(lp); o.start();
  });
}

// ── the board ──
let CELL, C, R, cells = [];
let manifest = [];
const imgMeta = new Map(); // url -> {w, h, ready}

function ensureMeta(url) {
  if (imgMeta.has(url)) return imgMeta.get(url);
  const m = { w: 1600, h: 1200, ready: false };
  const im = new Image();
  im.onload = () => { m.w = im.naturalWidth; m.h = im.naturalHeight; m.ready = true; };
  im.src = url;
  imgMeta.set(url, m);
  return m;
}

function buildBoard() {
  board.innerHTML = '';
  cells = [];
  const VW = innerWidth, VH = innerHeight;
  CELL = Math.max(84, Math.floor(Math.min(VW, VH) / 7));
  C = Math.ceil(VW / CELL);
  R = Math.ceil(VH / CELL);
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.left = (c * CELL) + 'px';
      cell.style.top = (r * CELL) + 'px';
      cell.style.width = CELL + 'px';
      cell.style.height = CELL + 'px';
      cell.innerHTML = `
        <div class="half top"><div class="img"></div></div>
        <div class="half bottom"><div class="img"></div></div>
        <div class="flap">
          <div class="face front"><div class="img"></div></div>
          <div class="face back"><div class="img"></div></div>
        </div>`;
      board.appendChild(cell);
      cells.push({ el: cell, c, r,
        topImg: cell.querySelector('.half.top .img'),
        botImg: cell.querySelector('.half.bottom .img'),
        frontImg: cell.querySelector('.face.front .img'),
        backImg: cell.querySelector('.face.back .img'),
        flap: cell.querySelector('.flap'),
      });
    }
  }
}

// slice an image (cover-fit to the viewport) onto one cell-sized layer
function setSlice(el, url, meta, c, r) {
  const VW = innerWidth, VH = innerHeight;
  const s = Math.max(VW / meta.w, VH / meta.h);
  const sw = meta.w * s, sh = meta.h * s;
  const ox = (VW - sw) / 2, oy = (VH - sh) / 2;
  el.style.backgroundImage = `url("${url}")`;
  el.style.backgroundSize = `${sw}px ${sh}px`;
  el.style.backgroundPosition = `${ox - c * CELL}px ${oy - r * CELL}px`;
}

function paintAll(url, meta) {
  for (const cell of cells) {
    setSlice(cell.topImg, url, meta, cell.c, cell.r);
    setSlice(cell.botImg, url, meta, cell.c, cell.r);
  }
}

// flip one column from current to next
function flipColumn(col, fromUrl, fromMeta, toUrl, toMeta) {
  for (const cell of cells) {
    if (cell.c !== col) continue;
    setSlice(cell.frontImg, fromUrl, fromMeta, cell.c, cell.r); // flap front = old top
    setSlice(cell.backImg, toUrl, toMeta, cell.c, cell.r);      // flap back = new bottom
    setSlice(cell.topImg, toUrl, toMeta, cell.c, cell.r);       // revealed behind flap
    const delay = cell.r * 32;
    cell.flap.style.transitionDelay = delay + 'ms';
    cell.el.classList.add('go');
    setTimeout(() => {
      setSlice(cell.botImg, toUrl, toMeta, cell.c, cell.r);
      cell.flap.style.transition = 'none';
      cell.el.classList.remove('go');
      void cell.flap.offsetHeight;
      cell.flap.style.transition = '';
      cell.flap.style.transitionDelay = '';
    }, delay + 230);
  }
}

// ── content: deterministic destination per cycle; the clock is one of
// the destinations ──
function destForSerial(serial) {
  const rng = mulberry32((serial * 2654435761) >>> 0);
  if (rng() < 0.15) return { clock: true };
  return { url: manifest[Math.floor(rng() * manifest.length)] };
}

let clockUrlCache = { key: '', url: '', meta: { w: 1600, h: 1000, ready: true } };
function clockDataUrl(date) {
  const key = date.toTimeString().slice(0, 5);
  if (clockUrlCache.key === key) return clockUrlCache;
  const c = document.createElement('canvas');
  c.width = 1600; c.height = 1000;
  const g = c.getContext('2d');
  const [r, gr, b] = HOUR_COLORS[date.getHours()];
  g.fillStyle = `rgb(${r},${gr},${b})`;
  g.fillRect(0, 0, 1600, 1000);
  g.fillStyle = '#fff';
  g.font = '700 230px Uniqlo, "Helvetica Neue", sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(key, 800, 520);
  clockUrlCache = { key, url: c.toDataURL('image/png'), meta: { w: 1600, h: 1000, ready: true } };
  return clockUrlCache;
}

function resolveDest(serial) {
  const d = destForSerial(serial);
  if (d.clock) {
    const cu = clockDataUrl(new Date());
    return { url: cu.url, meta: cu.meta };
  }
  return { url: d.url, meta: ensureMeta(d.url) };
}

// ── beat engine ──
let shownSerial = -1;

conductor.onBeat((beat) => {
  const phase = beat.wallSec;
  const serial = Math.floor(phase / CYC);
  const step = phase % CYC;
  const when = conductor.audioTimeForWallSec(beat.wallSec + 1);

  // preload two cycles ahead
  const ahead = destForSerial(serial + 1);
  if (ahead.url) ensureMeta(ahead.url);

  if (shownSerial === -1) {
    // first paint: whole board shows this cycle's destination
    const cur = resolveDest(serial);
    paintAll(cur.url, cur.meta);
    shownSerial = serial;
  }

  // the wave: steps 4 and 5 flip half the columns each
  if (step === 4 || step === 5) {
    const cur = resolveDest(serial);
    const nxt = resolveDest(serial + 1);
    const half = Math.ceil(C / 2);
    const start = step === 4 ? 0 : half;
    const end = step === 4 ? half : C;
    for (let col = start; col < end; col++) {
      const dly = (col - start) * 0.024;
      flipColumnLater(col, cur, nxt, (col - start) * 24);
      clackAt(when + dly, 0.04);
      clackAt(when + dly + 0.05, 0.025);
    }
    if (step === 5) shownSerial = serial + 1;
  }

  statusEl.textContent = `LIVE · BOARD ${serial % 1000} · ${beat.date.toTimeString().slice(0, 8)}`;
});

function flipColumnLater(col, cur, nxt, delayMs) {
  setTimeout(() => flipColumn(col, cur.url, cur.meta, nxt.url, nxt.meta), delayMs);
}

// ── entry ──
let entered = false;
const manifestReady = loadImageryManifest();

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    manifest = await manifestReady;
    makeNoise();
    startPad();
    buildBoard();
    // warm the first few destinations
    for (let i = 0; i < 3; i++) {
      const d = destForSerial(Math.floor(conductor.phase() / CYC) + i);
      if (d.url) ensureMeta(d.url);
    }
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
  } catch (err) {
    console.error(err);
    entered = false;
    const prompt = overlay.querySelector('.prompt');
    if (prompt) prompt.textContent = `failed to start: ${err.message} — click to retry`;
  }
});

addEventListener('resize', () => {
  if (!entered) return;
  buildBoard();
  shownSerial = -1;
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) {
    muted = !muted;
    master.gain.setValueAtTime(muted ? 0 : 1, ctx.currentTime);
  }
});
</script>

</body>
</html>
