<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 13 — masonry</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  :root { --ease-out: cubic-bezier(.1, 1, .2, 1); }
  #stage { position: absolute; inset: 0; background: #000; }
  .cell { position: absolute; overflow: hidden; background: #000; }
  .cell img, .cell video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell.in-top    { animation: inTop 280ms forwards var(--ease-out); }
  .cell.in-right  { animation: inRight 280ms forwards var(--ease-out); }
  .cell.in-bottom { animation: inBottom 280ms forwards var(--ease-out); }
  .cell.in-left   { animation: inLeft 280ms forwards var(--ease-out); }
  .cell.out-top    { animation: outTop 280ms forwards var(--ease-out); }
  .cell.out-right  { animation: outRight 280ms forwards var(--ease-out); }
  .cell.out-bottom { animation: outBottom 280ms forwards var(--ease-out); }
  .cell.out-left   { animation: outLeft 280ms forwards var(--ease-out); }
  @keyframes inTop    { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
  @keyframes inRight  { from { clip-path: inset(0 0 0 100%); } to { clip-path: inset(0); } }
  @keyframes inBottom { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0); } }
  @keyframes inLeft   { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }
  @keyframes outTop    { from { clip-path: inset(0); } to { clip-path: inset(0 0 100% 0); } }
  @keyframes outRight  { from { clip-path: inset(0); } to { clip-path: inset(0 0 0 100%); } }
  @keyframes outBottom { from { clip-path: inset(0); } to { clip-path: inset(100% 0 0 0); } }
  @keyframes outLeft   { from { clip-path: inset(0); } to { clip-path: inset(0 100% 0 0); } }

  #clock { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 5; font-family: "Uniqlo", "Helvetica Neue", sans-serif; font-weight: 700;
    font-size: 5.5vmin; letter-spacing: 0.04em; color: #fff; mix-blend-mode: difference;
    font-variant-numeric: tabular-nums; }
  #metro { position: fixed; left: 4vmin; top: 4vmin; width: 9vmin; height: 9vmin;
    z-index: 6; background: #fff; display: none; align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-family: "Helvetica Neue", Helvetica, sans-serif; font-weight: 700;
    font-size: 2.4vmin; letter-spacing: 0.04em; color: #111; }

  #label { position: fixed; left: 18px; bottom: 16px; z-index: 7; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 7; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; padding: 6vw; text-align: center; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 6vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 2.4vmin; opacity: 0.55; letter-spacing: 0.06em; line-height: 1.7; }
</style>
</head>
<body>

<div id="stage"></div>
<div id="clock">00:00:00</div>
<div id="metro"><span>IAAH</span></div>
<div id="label">COMP 13 — MASONRY · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">MASONRY</div>
  <div class="prompt">a grid of work, each block on its own clock. pieces arrive and leave
  on different beats — never all at once. videos and some stills hold longer; something
  is always moving. the clock and the mark keep time.</div>
  <div class="prompt">m mute · tap to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest } from '../../js/data.js';
import { SHOTS, makeReelVideo, playShot } from '../../js/pieces.js';

const stage = document.getElementById('stage');
const clockEl = document.getElementById('clock');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const conductor = createConductor();
const music = createMusic(conductor);

// ═══ the masonry: fixed slots that tile the vertical frame with deliberate
// gaps. Each slot runs its OWN cycle — hold N beats, then (some) gap —
// staggered by an offset so transitions land on different beats. Two slots
// are video and never gap, so something is always moving. Every decision
// is a pure function of the beat serial: broadcast-identical. ═══
const SLOTS = [
  // x, y, w, h (fractions) · kind · hold · gap · offset
  { x: 0.00, y: 0.000, w: 1.00, h: 0.28, kind: 'video', hold: 8, gap: 0, off: 0 },
  { x: 0.00, y: 0.295, w: 0.52, h: 0.30, kind: 'still', hold: 5, gap: 1, off: 1 },
  { x: 0.535, y: 0.295, w: 0.465, h: 0.185, kind: 'still', hold: 4, gap: 2, off: 4 },
  { x: 0.535, y: 0.495, w: 0.465, h: 0.235, kind: 'video', hold: 6, gap: 0, off: 3 },
  { x: 0.00, y: 0.610, w: 0.52, h: 0.245, kind: 'still', hold: 6, gap: 1, off: 2 },
  { x: 0.00, y: 0.870, w: 1.00, h: 0.130, kind: 'still', hold: 7, gap: 2, off: 5 },
];
const DIRS = ['top', 'right', 'bottom', 'left'];
const GOLD_S = 0.6180339887498949;
const GOLD_V = 0.7548776662466927;

let pool = [];
const cache = new Map();
function img(url) {
  if (!cache.has(url)) { const im = new Image(); im.src = url; cache.set(url, im); }
  return cache.get(url);
}
function stillFor(s, ci) {
  const f = (((s * 13 + ci) * GOLD_S) % 1 + 1) % 1;
  return pool[Math.floor(f * pool.length)];
}
function shotFor(s, ci) {
  const f = (((s * 7 + ci) * GOLD_V) % 1 + 1) % 1;
  return Math.floor(f * SHOTS.length);
}

// one reel-backed video element per video slot, reused across its cycles
const slotVideo = {};
SLOTS.forEach((def, s) => { if (def.kind === 'video') slotVideo[s] = makeReelVideo(); });

const slotCells = new Array(SLOTS.length).fill(null);

function position(cell, def) {
  cell.style.left = (def.x * 100) + '%';
  cell.style.top = (def.y * 100) + '%';
  cell.style.width = (def.w * 100) + '%';
  cell.style.height = (def.h * 100) + '%';
}

function clearSlot(s, animateDir) {
  const cell = slotCells[s];
  if (!cell) return;
  slotCells[s] = null;
  const v = cell.querySelector('video');
  const finish = () => {
    if (v) { v.pause(); v.style.display = 'none'; document.body.appendChild(v); }
    cell.remove();
  };
  if (animateDir) {
    cell.className = 'cell out-' + animateDir;
    let done = false;
    const fin = () => { if (!done) { done = true; finish(); } };
    cell.addEventListener('animationend', fin, { once: true });
    setTimeout(fin, 360);
  } else finish();
}

function spawn(s, ci) {
  const def = SLOTS[s];
  clearSlot(s); // instant clear; the new cell wipes in over the gap
  const cell = document.createElement('div');
  position(cell, def);
  cell.className = 'cell in-' + DIRS[(s + ci) % 4];
  if (def.kind === 'video') {
    const v = slotVideo[s];
    v.style.display = 'block';
    playShot(v, shotFor(s, ci));
    cell.appendChild(v);
  } else {
    const im = img(stillFor(s, ci)).cloneNode();
    cell.appendChild(im);
  }
  stage.appendChild(cell);
  slotCells[s] = cell;
}

// drive each slot's own cycle from the absolute beat
function tickSlots(n) {
  let changes = 0;
  SLOTS.forEach((def, s) => {
    const cyc = def.hold + def.gap;
    const rel = n - def.off;
    const local = ((rel % cyc) + cyc) % cyc;
    const ci = Math.floor(rel / cyc);
    if (local === 0) { spawn(s, ci); changes++; }
    else if (def.gap > 0 && local === def.hold) { clearSlot(s, DIRS[(s + ci + 2) % 4]); changes++; }
  });
  return changes;
}

let lastBeat = -1;
function render() {
  const n = Math.floor(conductor.phase());
  if (n !== lastBeat) { lastBeat = n; tickSlots(n); }
  clockEl.textContent = new Date(conductor.phase() * 1000).toTimeString().slice(0, 8);
  requestAnimationFrame(render);
}

let metroDeg = 0;
conductor.onBeat((beat) => {
  music.onBeat(beat);
  const n = Math.floor(conductor.phase());
  if (n !== lastBeat) { lastBeat = n; tickSlots(n); } // occlusion-proof
  metroDeg += 90;
  metro.style.transform = `rotate(${metroDeg}deg)`;
  // keep video pieces alive (browsers pause muted video when the tab loses
  // focus; nudge them back so motion resumes the moment you're looking)
  for (const s in slotVideo) {
    const v = slotVideo[s];
    if (v.isConnected && v.closest('.cell') && v.paused) v.play().catch(() => {});
  }
  statusEl.textContent = `MASONRY · ${beat.date.toTimeString().slice(0, 8)}`;
});

let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    pool = await manifestReady;
    pool.forEach(img); // preload every still
    metro.style.display = 'flex';
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    // prime: spawn whatever each slot should currently be showing
    const n = Math.floor(conductor.phase());
    SLOTS.forEach((def, s) => {
      const cyc = def.hold + def.gap;
      const rel = n - def.off;
      const local = ((rel % cyc) + cyc) % cyc;
      const ci = Math.floor(rel / cyc);
      if (local < def.hold) spawn(s, ci);
    });
    lastBeat = n;
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
