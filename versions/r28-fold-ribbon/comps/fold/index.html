<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 18 — fold</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  /* the prism: a vertical drum of image faces joined at their seams, rotating
     on the X axis. the front face fills; its neighbours fold away above and
     below into the black, showing the seams — silent-house style. */
  #stage { position: absolute; inset: 0; perspective: 1600px; background: #000; }
  #drum { position: absolute; inset: 0; transform-style: preserve-3d; }
  .face { position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    overflow: hidden; backface-visibility: hidden; background: #000; }
  .face img, .face video { width: 100%; height: 100%; object-fit: cover; display: block; }

  #clock { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 4; font-family: "Uniqlo", "Helvetica Neue", sans-serif; font-weight: 700;
    font-size: 6vmin; letter-spacing: 0.04em; color: #fff; mix-blend-mode: difference;
    font-variant-numeric: tabular-nums; }
  #metro { position: fixed; left: 3vmin; top: 3vmin; width: 4.75vmin; height: 4.75vmin;
    z-index: 6; background: #fff; display: none; align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-weight: 700; font-size: 1.25vmin; letter-spacing: 0.04em; color: #111; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em; font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; padding: 6vw; text-align: center; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 6vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 2.4vmin; opacity: 0.55; letter-spacing: 0.06em; line-height: 1.7; }
</style>
</head>
<body>

<div id="stage"><div id="drum"></div></div>
<div id="clock">00:00:00</div>
<div id="metro"><span>IAAH</span></div>
<div id="label">COMP 18 — FOLD · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">FOLD</div>
  <div class="prompt">the archive as a folded ribbon — works joined at their seams on a
  turning prism, each one folding away into the black as the next rolls up to face you.
  one work forward per beat. the clock and the mark keep time.</div>
  <div class="prompt">m mute · tap to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest } from '../../js/data.js';
import { getClip, playClip, pickClipIdx, warmClips } from '../../js/pieces.js';

const stage = document.getElementById('stage');
const drum = document.getElementById('drum');
const clockEl = document.getElementById('clock');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const conductor = createConductor();
const music = createMusic(conductor);

function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rng = mulberry32(0xf01d);

// ── the drum geometry ──
const N = 7;                       // faces around the prism
const STEP = 360 / N;              // degrees between faces
const STEP_RAD = (Math.PI * 2) / N;
let R = 600;                       // radius (px) — recomputed to viewport on resize
const faces = [];

let pool = [], queue = [];
const cache = new Map();
function img(url) { if (!cache.has(url)) { const im = new Image(); im.src = url; cache.set(url, im); } return cache.get(url); }
function nextStill() { if (!queue.length) { queue = [...pool]; for (let i = queue.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [queue[i], queue[j]] = [queue[j], queue[i]]; } } return queue.pop(); }

function fillFace(face, makeVideo) {
  const old = face.querySelector('video'); if (old) { old.pause(); old.style.display = 'none'; document.body.appendChild(old); }
  face.innerHTML = '';
  if (makeVideo) { const v = getClip(pickClipIdx(rng())); v.style.display = 'block'; playClip(v); face.appendChild(v); face._vid = v; }
  else { face.appendChild(img(nextStill()).cloneNode()); face._vid = null; }
}

function buildDrum() {
  drum.innerHTML = '';
  faces.length = 0;
  for (let i = 0; i < N; i++) {
    const f = document.createElement('div');
    f.className = 'face';
    drum.appendChild(f);
    faces.push(f);
    fillFace(f, rng() < 0.18);
  }
  layoutDrum();
}
function layoutDrum() {
  R = innerHeight / (2 * Math.tan(STEP_RAD / 2)); // faces meet seam-to-seam
  faces.forEach((f, i) => { f.style.transform = `rotateX(${i * STEP}deg) translateZ(${R}px)`; });
  drum.style.transform = `translateZ(${-R}px) rotateX(${shownAngle}deg)`;
}

// ── rotation: one face forward per beat, eased; refresh the face at the back ──
let targetAngle = 0;   // degrees
let shownAngle = 0;
let lastBeat = -1;

function frontIndex() { return ((Math.round(-targetAngle / STEP) % N) + N) % N; }

function stepBeat(n) {
  lastBeat = n;
  // the face now at the far back gets fresh content before it swings to front
  const back = (frontIndex() + Math.floor(N / 2)) % N;
  fillFace(faces[back], rng() < 0.22);
  targetAngle -= STEP;   // roll the drum forward (top folds back)
}

function render() {
  const phase = conductor.phase();
  const beat = Math.floor(phase);
  if (beat !== lastBeat) stepBeat(beat);
  shownAngle += (targetAngle - shownAngle) * 0.14;
  drum.style.transform = `translateZ(${-R}px) rotateX(${shownAngle}deg)`;
  clockEl.textContent = new Date(phase * 1000).toTimeString().slice(0, 8);
  requestAnimationFrame(render);
}

let metroDeg = 0;
conductor.onBeat((beat) => {
  music.onBeat(beat);
  if (Math.floor(conductor.phase()) !== lastBeat) stepBeat(Math.floor(conductor.phase()));
  metroDeg += 90;
  metro.style.transform = `rotate(${metroDeg}deg)`;
  faces.forEach((f) => { if (f._vid && f._vid.closest('.face') && f._vid.paused) f._vid.play().catch(() => {}); });
  statusEl.textContent = `FOLD · ${beat.date.toTimeString().slice(0, 8)}`;
});

addEventListener('resize', () => { if (faces.length) layoutDrum(); });

let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    pool = await manifestReady;
    pool.forEach(img); warmClips(3);
    buildDrum();
    targetAngle = 0; shownAngle = STEP; lastBeat = Math.floor(conductor.phase());
    metro.style.display = 'flex';
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; const p = overlay.querySelector('.prompt'); if (p) p.textContent = 'failed: ' + err.message; }
});

document.addEventListener('keydown', (e) => { if (e.key === 'm' && entered) music.toggleMute(); });
</script>

</body>
</html>
