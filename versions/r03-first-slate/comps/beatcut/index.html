<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 05 — beat-cut</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  img, video { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: none; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<img id="i0" alt=""><img id="i1" alt="">
<video id="v0" muted playsinline preload="auto"></video>
<video id="v1" muted playsinline preload="auto"></video>
<div id="label">COMP 05 — BEAT-CUT · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">BEAT-CUT</div>
  <div class="prompt">the archive channel-surfs itself — stills hold for a beat or two,<br>
  dancers interrupt, every cut lands on the clock. scored by the UNIQLOCK track.</div>
  <div class="prompt">1 / 2 / 3 — cut density · m mute · click to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { VIDEOS, timeOfDay, loadImageryManifest } from '../../js/data.js';

const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const imgs = [document.getElementById('i0'), document.getElementById('i1')];
const vids = [document.getElementById('v0'), document.getElementById('v1')];

const conductor = createConductor();
const music = createMusic(conductor);

const DENSITY = { 1: { mul: 2, name: 'HALF-TIME' }, 2: { mul: 1, name: 'ON THE BEAT' }, 3: { mul: 0.5, name: 'DOUBLE-TIME' } };
let density = 2;

// ── pools ──
let stillPool = [];
let stillQueue = [];
let clipQueue = [];

function shuffled(list) {
  const a = [...list];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextStillUrl() {
  if (stillQueue.length === 0) stillQueue = shuffled(stillPool);
  return stillQueue.pop();
}

function nextClipUrl() {
  if (clipQueue.length === 0) clipQueue = shuffled(VIDEOS[timeOfDay(new Date().getHours())]);
  return clipQueue.pop();
}

// ── slot rhythm: stills hold 1–2 beats with the occasional half-beat
//    stutter pair; dance clips interrupt for 3–4 beats ──
const slotQueue = [];
function refillSlots() {
  const r = Math.random();
  if (r < 0.16) slotQueue.push({ t: 'still', b: 0.5 }, { t: 'still', b: 0.5 });
  else if (r < 0.5) slotQueue.push({ t: 'still', b: 1 });
  else if (r < 0.68) slotQueue.push({ t: 'still', b: 2 });
  else if (r < 0.88) slotQueue.push({ t: 'clip', b: 3 });
  else slotQueue.push({ t: 'clip', b: 4 });
}
function nextSlot() {
  if (slotQueue.length === 0) refillSlots();
  return slotQueue.shift();
}

// ── prepare → cut machinery (always one asset staged ahead) ──
let imgStandby = 0;
let vidStandby = 0;
let pending = null;       // { t, b } staged for the next cut
let nextCutPhase = 0;
let cutsDone = 0;

function prepareNext() {
  pending = nextSlot();
  if (pending.t === 'still') {
    imgs[imgStandby].src = nextStillUrl();
  } else {
    const v = vids[vidStandby];
    v.src = nextClipUrl();
    v.load();
  }
}

function pendingReady() {
  if (!pending) return false;
  if (pending.t === 'still') {
    const im = imgs[imgStandby];
    return im.complete && im.naturalWidth > 0;
  }
  return vids[vidStandby].readyState >= 2;
}

function showOnly(el) {
  for (const e of [...imgs, ...vids]) {
    if (e === el) continue;
    e.style.display = 'none';
    if (e.tagName === 'VIDEO') e.pause();
  }
  el.style.display = 'block';
}

function doCut() {
  let el;
  if (pending.t === 'still') {
    el = imgs[imgStandby];
    imgStandby = 1 - imgStandby;
  } else {
    el = vids[vidStandby];
    el.currentTime = 0;
    el.play().catch(() => {});
    vidStandby = 1 - vidStandby;
  }
  showOnly(el);
  cutsDone++;
}

function render() {
  const p = conductor.phase();
  if (p - nextCutPhase > 4) {
    nextCutPhase = Math.ceil(p);             // background-tab resync
  } else if (p >= nextCutPhase) {
    if (pendingReady()) {
      const dur = pending.b * DENSITY[density].mul;
      doCut();
      prepareNext();
      nextCutPhase += dur;
    } else {
      nextCutPhase += 1;                     // asset late: hold one beat
    }
  }
  requestAnimationFrame(render);
}

conductor.onBeat((beat) => {
  music.onBeat(beat);
  statusEl.textContent = `${DENSITY[density].name} · CUT ${String(cutsDone).padStart(3, '0')} · ${beat.date.toTimeString().slice(0, 8)}`;
});

// ── entry ──
let entered = false;
const ready = Promise.all([music.load(), loadImageryManifest()]);

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  overlay.classList.add('leaving');
  await conductor.start();
  const [, manifest] = await ready;
  stillPool = manifest;
  music.begin();

  // open on a still immediately — no waiting on video buffers
  const first = imgs[imgStandby];
  first.src = nextStillUrl();
  await new Promise((res) => { first.complete ? res() : first.addEventListener('load', res, { once: true }); });
  showOnly(first);
  imgStandby = 1 - imgStandby;
  prepareNext();

  nextCutPhase = Math.ceil(conductor.phase() + 0.5);
  requestAnimationFrame(render);
  setTimeout(() => overlay.remove(), 600);
});

document.addEventListener('keydown', (e) => {
  if (!entered) return;
  if (e.key === 'm') music.toggleMute();
  if (DENSITY[e.key]) density = Number(e.key);
});
</script>

</body>
</html>
