<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 06 — z-tunnel broadcast</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
<script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js" } }
</script>
</head>
<body>

<canvas id="gl"></canvas>
<div id="label">COMP 06 — Z-TUNNEL BROADCAST · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">Z-TUNNEL</div>
  <div class="prompt">the broadcast, in depth: the archive hangs as stations down a tunnel,<br>
  the camera walks the beat, the clock floats among the work, glass bends the
  approach.<br>same minute, same tunnel, for everyone.</div>
  <div class="prompt">m mute · click to enter, sound on</div>
</div>

<script>window.UQ_ASSET_ROOT = location.origin + location.pathname.replace(/versions\/.*$/, "");</script>
<script type="module">
import * as THREE from 'three';
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { VIDEOS, HOUR_COLORS, timeOfDay, loadImageryManifest } from '../../js/data.js';

const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');

const conductor = createConductor();
const music = createMusic(conductor);

// ═══ broadcast geometry: station n lives at beat n*B forever. The camera
// position is a pure function of the clock, so everyone is at the same
// point in the same tunnel at the same moment. ═══
const B = 4;          // beats per station
const S = 10;         // world units between stations
let nBase = 0;        // rebases world coords so floats stay sane

function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── three.js ──
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
let VW = innerWidth, VH = innerHeight;
const camera = new THREE.PerspectiveCamera(58, VW / VH, 0.1, 140);
const VOID = 0x232120;
const scene = new THREE.Scene();
scene.background = new THREE.Color(VOID);
scene.fog = new THREE.Fog(VOID, 26, 90);

const backdrop = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(256, 256, 40, 256, 256, 360);
  grad.addColorStop(0, '#403b37');
  grad.addColorStop(0.55, '#2b2826');
  grad.addColorStop(1, '#191717');
  g.fillStyle = grad; g.fillRect(0, 0, 512, 512);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map: tex, fog: false }));
  mesh.scale.set(320, 320, 1);
  scene.add(mesh);
  return mesh;
})();

let rt = new THREE.WebGLRenderTarget(VW * renderer.getPixelRatio(), VH * renderer.getPixelRatio());
const lensScene = new THREE.Scene();
const lensCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
lensCam.position.z = 1;
const lensMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy,0.,1.); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform sampler2D tex1; uniform float textureScale; uniform float time;
    uniform float displacement; uniform float scrollDif;
    void main(){
      vec4 c1 = texture2D(tex1, vUv);
      float lum = (c1.r + c1.g + c1.b) / 3.0;
      vec2 cv = vUv - 0.5;
      float oc = (0.5 - distance(cv, vec2(0.0))) * (textureScale * 10.0);
      vec2 nv = vUv - 0.5;
      nv *= 1.0 + 0.5 * displacement - (1.0 - oc) * displacement * 0.5;
      nv.y *= 1.0 - sin(time * 0.001 + vUv.x * 10.1 + lum * 10.1) * scrollDif * 0.01;
      nv += 0.5;
      gl_FragColor = texture2D(tex1, nv);
    }`,
  uniforms: {
    tex1: { value: rt.texture },
    textureScale: { value: 0.4 },
    time: { value: 0 },
    displacement: { value: 0.3 },
    scrollDif: { value: 0 },
  },
});
lensScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), lensMat));

function resize() {
  VW = innerWidth; VH = innerHeight;
  camera.aspect = VW / VH;
  camera.updateProjectionMatrix();
  renderer.setSize(VW, VH);
  rt.setSize(VW * renderer.getPixelRatio(), VH * renderer.getPixelRatio());
}
addEventListener('resize', resize);
resize();

// ── content ──
let manifest = [];
const texLoader = new THREE.TextureLoader();

const vids = [0, 1].map(() => {
  const v = document.createElement('video');
  v.muted = true; v.playsInline = true; v.crossOrigin = 'anonymous'; v.preload = 'auto';
  return v;
});
let vidBusy = [false, false];

const liveClockPaints = new Set();
function makeClockTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 640;
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const paint = (date) => {
    const g = c.getContext('2d');
    const [r, gr, b] = HOUR_COLORS[date.getHours()];
    const invert = date.getSeconds() % 2 === 1;
    g.fillStyle = invert ? '#fff' : `rgb(${r},${gr},${b})`;
    g.fillRect(0, 0, 640, 640);
    g.fillStyle = invert ? `rgb(${r},${gr},${b})` : '#fff';
    g.font = '700 92px Uniqlo, "Helvetica Neue", sans-serif';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(date.toTimeString().slice(0, 8), 320, 330);
    tex.needsUpdate = true;
  };
  paint(new Date());
  return { tex, paint };
}

// ── stations ──
const stations = new Map(); // n -> { group, dispose, clockPaint }

function stationZ(n) { return -(n - nBase) * S; }

function buildStation(n) {
  const rng = mulberry32((n * 2654435761) >>> 0);
  const group = new THREE.Group();
  group.position.z = stationZ(n);
  scene.add(group);
  const record = { group, disposables: [], clockPaint: null, video: null };

  const roll = rng();
  const planeAt = (w, h, x, y, mat) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    m.position.set(x, y, 0);
    group.add(m);
    return m;
  };

  if (roll < 0.12) {
    // the clock floats in the tunnel
    const { tex, paint } = makeClockTexture();
    record.clockPaint = paint;
    liveClockPaints.add(paint);
    const mat = new THREE.MeshBasicMaterial({ map: tex, fog: true });
    record.disposables.push(tex, mat);
    planeAt(4, 4, (rng() - 0.5) * 3, (rng() - 0.5) * 1.5, mat);
  } else if (roll < 0.34 && (vidBusy.indexOf(false) >= 0)) {
    // a dancer hangs in space
    const vi = vidBusy.indexOf(false);
    vidBusy[vi] = true;
    const v = vids[vi];
    record.video = vi;
    const pool = VIDEOS[timeOfDay(new Date().getHours())];
    v.src = pool[Math.floor(rng() * pool.length)];
    v.load();
    const tex = new THREE.VideoTexture(v);
    tex.colorSpace = THREE.SRGBColorSpace;
    const mat = new THREE.MeshBasicMaterial({ map: tex, fog: true });
    record.disposables.push(tex, mat);
    planeAt(5.6, 4.2, (rng() - 0.5) * 2.5, (rng() - 0.5) * 1.2, mat);
    v.play().catch(() => {});
  } else {
    // 1-2 stills, aspect-true, butted on a shared 3D edge
    const count = rng() < 0.45 ? 2 : 1;
    let prevRight = null, prevH = 0, prevY = 0, prevX = 0;
    for (let i = 0; i < count; i++) {
      const idx = Math.floor(rng() * manifest.length);
      const h = [3.4, 4.4, 5.4][Math.floor(rng() * 3)];
      const x0 = (rng() - 0.5) * 3.2;
      const yAlign = Math.floor(rng() * 3);
      texLoader.load(manifest[idx], (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        const a = tex.image.width / tex.image.height;
        const w = h * a;
        const mat = new THREE.MeshBasicMaterial({ map: tex, fog: true });
        record.disposables.push(tex, mat);
        let x, y;
        if (prevRight === null) {
          x = x0; y = (rng() - 0.5) * 1.2;
        } else {
          x = prevRight + w / 2;
          y = [prevY + prevH / 2 - h / 2, prevY - prevH / 2 + h / 2, prevY][yAlign];
        }
        planeAt(w, h, x, y, mat);
        prevRight = x + w / 2; prevH = h; prevY = y; prevX = x;
      });
    }
  }

  record.dispose = () => {
    scene.remove(group);
    group.traverse((o) => { if (o.geometry) o.geometry.dispose(); });
    record.disposables.forEach((d) => d.dispose && d.dispose());
    if (record.clockPaint) liveClockPaints.delete(record.clockPaint);
    if (record.video !== null) { vids[record.video].pause(); vidBusy[record.video] = false; }
  };
  stations.set(n, record);
}

function ensureStations(nCam) {
  for (let n = Math.max(0, nCam - 1); n <= nCam + 6; n++) {
    if (!stations.has(n)) buildStation(n);
  }
  for (const [n, rec] of stations) {
    if (n < nCam - 1 || n > nCam + 7) { rec.dispose(); stations.delete(n); }
  }
}

// ── motion: the camera walks the beat; glass narrates the approach ──
let impulse = 0;
let disp = 0.3;

function dispTarget(u) {
  // u = progress between stations: loud leaving, quiet at hero, loud passing
  if (u < 0.25) return 0.45 - (u / 0.25) * 0.2;
  if (u < 0.7) return 0.25 - ((u - 0.25) / 0.45) * 0.17;
  return 0.08 + ((u - 0.7) / 0.3) * 0.45;
}

let lastT = 0;
function render(t) {
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;

  const phase = conductor.phase();
  const beat = Math.floor(phase);
  const frac = phase - beat;
  const snap = 1 - Math.pow(1 - Math.min(frac / 0.3, 1), 3);
  const eased = beat + snap;

  const camZ = -(eased - nBase * B) * (S / B) + 2;
  camera.position.z = camZ;
  backdrop.position.z = camZ - 120;

  const nCam = Math.floor(eased / B);
  ensureStations(nCam);

  impulse *= Math.pow(0.12, dt);
  const u = (eased % B) / B;
  disp += (dispTarget(u) - disp) * Math.min(1, dt * 5);
  lensMat.uniforms.displacement.value = disp;
  lensMat.uniforms.scrollDif.value = impulse * 0.8;
  lensMat.uniforms.time.value = t;

  renderer.setRenderTarget(rt);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(lensScene, lensCam);
  requestAnimationFrame(render);
}

conductor.onBeat((beat) => {
  music.onBeat(beat);
  impulse = 1;
  for (const paint of liveClockPaints) paint(beat.date);
  statusEl.textContent = `LIVE · STATION ${Math.floor(beat.wallSec / B)} · ${beat.date.toTimeString().slice(0, 8)}`;
});

// ── entry ──
let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    manifest = await manifestReady;
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    nBase = Math.floor(conductor.phase() / B);
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch((err) => {
      console.warn('[ztunnel] music failed, running silent:', err);
      statusEl.textContent = 'music failed — running silent';
    });
  } catch (err) {
    console.error(err);
    entered = false;
    const prompt = overlay.querySelector('.prompt');
    if (prompt) prompt.textContent = `failed to start: ${err.message} — click to retry`;
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
