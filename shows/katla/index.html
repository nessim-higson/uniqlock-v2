<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOW 001 — KATLA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; color: #fff; }
  :root { --ease-out: cubic-bezier(.1, 1, .2, 1); }
  #stage { position: absolute; inset: 0; background: #000; }
  .layer { position: absolute; inset: 0; }
  .layer img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .layer.in-top    { animation: inTop 260ms forwards var(--ease-out); }
  .layer.in-right  { animation: inRight 260ms forwards var(--ease-out); }
  .layer.in-bottom { animation: inBottom 260ms forwards var(--ease-out); }
  .layer.in-left   { animation: inLeft 260ms forwards var(--ease-out); }
  @keyframes inTop    { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
  @keyframes inRight  { from { clip-path: inset(0 0 0 100%); } to { clip-path: inset(0); } }
  @keyframes inBottom { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0); } }
  @keyframes inLeft   { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }

  /* ── metronome indicators — all hidden, body.m-N shows one ── */
  .metro { position: fixed; z-index: 6; pointer-events: none; display: none; }
  body.m-1 #pendulum, body.m-2 #seq, body.m-3 #pulse,
  body.m-4 #edge, body.m-5 #beatbox { display: block; }

  /* 1 — pendulum: a literal metronome wand */
  #pendulum { left: 50%; bottom: 4vmin; width: 2px; height: 22vmin;
    margin-left: -1px; transform-origin: bottom center; }
  #pendulum .arm { position: absolute; inset: 0; background: rgba(255,255,255,0.85); }
  #pendulum .bob { position: absolute; top: 14%; left: 50%; width: 2.6vmin; height: 2.6vmin;
    margin-left: -1.3vmin; border-radius: 50%; background: #fff; }
  #pendulum .base { position: absolute; bottom: -1.4vmin; left: 50%; width: 6vmin; height: 1.4vmin;
    margin-left: -3vmin; background: rgba(255,255,255,0.6); }

  /* 2 — sequencer: a bar of beat cells with a playhead */
  #seq { left: 50%; bottom: 4vmin; transform: translateX(-50%);
    display: flex; gap: 0.8vmin; }
  #seq .cell { width: 3.4vmin; height: 0.7vmin; background: rgba(255,255,255,0.22); }
  #seq .cell.on { background: #fff; }
  #seq .cell.bar { height: 1.1vmin; }

  /* 3 — pulse ring: a felt thump at center */
  #pulse { left: 50%; top: 50%; width: 26vmin; height: 26vmin; margin: -13vmin 0 0 -13vmin; }
  #pulse .ring { position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0.55);
    border-radius: 50%; }
  body.m-3 #pulse .ring { animation: none; }
  .thump { animation: thump 600ms var(--ease-out); }
  @keyframes thump { 0% { transform: scale(0.86); opacity: 0.9; } 100% { transform: scale(1.18); opacity: 0; } }

  /* 4 — edge breathe: the frame itself pulses */
  #edge { inset: 0; }
  #edge .b { position: absolute; inset: 1.2vmin; border: 1px solid rgba(255,255,255,0); }
  .edgeflash { animation: edgeflash 500ms ease-out; }
  @keyframes edgeflash { 0% { border-color: rgba(255,255,255,0.85); } 100% { border-color: rgba(255,255,255,0); } }

  /* 5 — beat box + count: brand + information */
  #beatbox { left: 22px; top: 22px; display: flex; gap: 14px; align-items: center; }
  #beatbox .box { width: 4.6vmin; height: 4.6vmin; background: #fff; display: flex;
    align-items: center; justify-content: center;
    transition: transform 200ms cubic-bezier(.3,0,.15,1); }
  #beatbox .box span { font-weight: 700; font-size: 1.2vmin; color: #111; }
  #beatbox .read { font-size: 11px; letter-spacing: 0.16em; line-height: 1.5;
    font-variant-numeric: tabular-nums; opacity: 0.85; }

  #label { position: fixed; left: 18px; bottom: 16px; z-index: 7; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 7; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
</style>
</head>
<body class="m-1">

<div id="stage"></div>

<div class="metro" id="pendulum"><div class="arm"></div><div class="bob"></div><div class="base"></div></div>
<div class="metro" id="seq"></div>
<div class="metro" id="pulse"><div class="ring"></div></div>
<div class="metro" id="edge"><div class="b"></div></div>
<div class="metro" id="beatbox"><div class="box"><span>IAAH</span></div><div class="read"></div></div>

<div id="label">SHOW 001 — KATLA · <a href="../../comps/">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">SHOW 001 — KATLA</div>
  <div class="prompt">the work changes on every beat now. press 1–5 to swap the metronome
  indicator:<br>1 pendulum · 2 sequencer · 3 pulse · 4 edge · 5 box + count.</div>
  <div class="prompt">m mute · click to enter, sound on</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { ROOT } from '../../js/data.js';

const A = ROOT + 'assets/shows/katla/';
// authored order — one frame per beat, looping. marks and scenes
// alternate so each beat reads as a clear change.
const FRAMES = ['k02.jpg','k04.jpg','k07.jpg','k06.jpg','k05.jpg','k11.jpg','k00.jpg','k01.jpg','k03.jpg','k09.jpg'];
const BAR = 4;

const stage = document.getElementById('stage');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const conductor = createConductor();
const music = createMusic(conductor);

const cache = new Map();
FRAMES.forEach((n) => { const im = new Image(); im.src = A + n; cache.set(n, im); });

// build the sequencer cells
const seqEl = document.getElementById('seq');
for (let i = 0; i < BAR; i++) {
  const c = document.createElement('div');
  c.className = 'cell bar';
  seqEl.appendChild(c);
}
const seqCells = [...seqEl.children];

const DIRS = ['top', 'right', 'bottom', 'left'];
let shownBeat = -1;
let layers = [];

function showFrame(beatN) {
  shownBeat = beatN;
  const layer = document.createElement('div');
  layer.className = 'layer in-' + DIRS[beatN % 4];
  const im = cache.get(FRAMES[((beatN % FRAMES.length) + FRAMES.length) % FRAMES.length]).cloneNode();
  layer.appendChild(im);
  stage.appendChild(layer);
  layers.push(layer);
  while (layers.length > 2) layers.shift().remove();
}

function render() {
  const beatN = Math.floor(conductor.phase());
  if (beatN !== shownBeat) showFrame(beatN);
  requestAnimationFrame(render);
}

// metronome animations
const pend = document.getElementById('pendulum');
const pulseRing = document.querySelector('#pulse .ring');
const edgeB = document.querySelector('#edge .b');
const beatBox = document.querySelector('#beatbox .box');
const beatRead = document.querySelector('#beatbox .read');
let pendDeg = 16, boxDeg = 0;

conductor.onBeat((beat) => {
  music.onBeat(beat);
  const beatN = Math.floor(conductor.phase());
  if (beatN !== shownBeat) showFrame(beatN); // occlusion-proof
  const inBar = beat.n % BAR;

  // 1 pendulum — arrive at the extreme exactly on the beat
  pendDeg = -pendDeg;
  pend.style.transition = `transform ${Math.round(60000 / 60)}ms linear`;
  pend.style.transform = `rotate(${pendDeg}deg)`;

  // 2 sequencer
  seqCells.forEach((c, i) => c.classList.toggle('on', i === inBar));

  // 3 pulse — retrigger thump
  pulseRing.classList.remove('thump'); void pulseRing.offsetWidth; pulseRing.classList.add('thump');

  // 4 edge — brighter on the downbeat
  edgeB.classList.remove('edgeflash'); void edgeB.offsetWidth;
  edgeB.style.setProperty('--x', inBar === 0 ? 1 : 0.5);
  edgeB.classList.add('edgeflash');

  // 5 box + count
  boxDeg += 90;
  beatBox.style.transform = `rotate(${boxDeg}deg)`;
  beatRead.innerHTML = `60 BPM · LIVE<br>BEAT ${String(inBar + 1)} / ${BAR}<br>${beat.date.toTimeString().slice(0,8)}`;

  statusEl.textContent = `EVERY BEAT · ${FRAMES[((beatN % FRAMES.length)+FRAMES.length)%FRAMES.length].replace('.jpg','').toUpperCase()} · ${beat.date.toTimeString().slice(0,8)}`;
});

let entered = false;
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
  if (['1','2','3','4','5'].includes(e.key)) {
    document.body.className = 'm-' + e.key;
  }
});
</script>

</body>
</html>
