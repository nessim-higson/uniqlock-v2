<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 15 — solo</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  :root { --ease-out: cubic-bezier(.1, 1, .2, 1); }
  #stage { position: absolute; inset: 0; }
  .layer { position: absolute; inset: 0; }
  .layer img, .layer video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .layer.in-top    { animation: inTop 300ms forwards var(--ease-out); }
  .layer.in-right  { animation: inRight 300ms forwards var(--ease-out); }
  .layer.in-bottom { animation: inBottom 300ms forwards var(--ease-out); }
  .layer.in-left   { animation: inLeft 300ms forwards var(--ease-out); }
  @keyframes inTop    { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
  @keyframes inRight  { from { clip-path: inset(0 0 0 100%); } to { clip-path: inset(0); } }
  @keyframes inBottom { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0); } }
  @keyframes inLeft   { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }

  #clock { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 4; font-family: "Uniqlo", "Helvetica Neue", sans-serif; font-weight: 700;
    font-size: 6vmin; letter-spacing: 0.04em; color: #fff; mix-blend-mode: difference;
    font-variant-numeric: tabular-nums; }
  #metro { position: fixed; left: 4vmin; top: 4vmin; width: 9.5vmin; height: 9.5vmin;
    z-index: 6; background: #fff; display: none; align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-weight: 700; font-size: 2.5vmin; letter-spacing: 0.04em; color: #111; }

  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; padding: 6vw; text-align: center; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 6vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 2.4vmin; opacity: 0.55; letter-spacing: 0.06em; line-height: 1.7; }
</style>
</head>
<body>

<div id="stage"></div>
<div id="clock">00:00:00</div>
<div id="metro"><span>IAAH</span></div>
<div id="label">COMP 15 — SOLO · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">SOLO</div>
  <div class="prompt">one work at a time, full frame, swiping in on every beat. when a
  video comes up it hangs for a few seconds, then the swiping resumes. the clock and the
  mark keep time the whole way.</div>
  <div class="prompt">m mute · tap to enter, sound on</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest } from '../../js/data.js';
import { makeReelVideo, playFrom, startFor } from '../../js/pieces.js';

const stage = document.getElementById('stage');
const clockEl = document.getElementById('clock');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const conductor = createConductor();
const music = createMusic(conductor);

const HANG = 4;          // beats a video hangs before swiping resumes
const HANG_SEC = 5;      // seconds of continuous reel a hung clip plays
const VIDEO_CHANCE = 0.2;

function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(0x501010);
const pick = (a) => a[Math.floor(rng() * a.length)];

let pool = [];
let queue = [];
const cache = new Map();
function img(url) {
  if (!cache.has(url)) { const im = new Image(); im.src = url; cache.set(url, im); }
  return cache.get(url);
}
function nextStill() {
  if (!queue.length) {
    queue = [...pool];
    for (let i = queue.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [queue[i], queue[j]] = [queue[j], queue[i]]; }
  }
  return queue.pop();
}

const reel = makeReelVideo();
const DIRS = ['top', 'right', 'bottom', 'left'];
let layers = [];
let resumeBeat = -1;   // next beat allowed to swipe (after a hang)
let lastBeat = -1;
let held = false;      // did this beat hold a hanging video (no swipe)?

function swipe(n, makeVideo) {
  const layer = document.createElement('div');
  layer.className = 'layer in-' + pick(DIRS);
  if (makeVideo) {
    reel.style.display = 'block';
    playFrom(reel, startFor(rng(), HANG_SEC));
    layer.appendChild(reel);
  } else {
    layer.appendChild(img(nextStill()).cloneNode());
  }
  stage.appendChild(layer);
  layers.push(layer);
  while (layers.length > 2) {
    const old = layers.shift();
    const v = old.querySelector('video');
    if (v) { v.pause(); v.style.display = 'none'; document.body.appendChild(v); }
    old.remove();
  }
}

function step(n) {
  lastBeat = n;
  if (n < resumeBeat) { held = true; return; } // a video is hanging — hold
  held = false;
  const makeVideo = rng() < VIDEO_CHANCE;
  swipe(n, makeVideo);
  resumeBeat = makeVideo ? n + HANG : n + 1;
}

function render() {
  const n = Math.floor(conductor.phase());
  if (n !== lastBeat) step(n);
  clockEl.textContent = new Date(conductor.phase() * 1000).toTimeString().slice(0, 8);
  requestAnimationFrame(render);
}

let metroDeg = 0;
conductor.onBeat((beat) => {
  music.onBeat(beat);
  const n = Math.floor(conductor.phase());
  if (n !== lastBeat) step(n); // occlusion-proof
  metroDeg += 90;                 // the mark ticks every beat, even while a video hangs
  metro.style.transform = `rotate(${metroDeg}deg)`;
  if (reel.isConnected && reel.closest('.layer') && reel.paused) reel.play().catch(() => {});
  statusEl.textContent = `SOLO · ${held ? 'VIDEO HANGING' : 'SWIPING'} · ${beat.date.toTimeString().slice(0, 8)}`;
});

let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    pool = await manifestReady;
    pool.forEach(img);
    metro.style.display = 'flex';
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    lastBeat = Math.floor(conductor.phase()) - 1;
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
