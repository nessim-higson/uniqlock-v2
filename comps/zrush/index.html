<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 02 — z-rush</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #clock { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
<script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js" } }
</script>
</head>
<body>

<canvas id="gl"></canvas>
<div id="label">COMP 02 — Z-RUSH · <a href="../">back</a></div>
<div id="clock"></div>
<div id="overlay">
  <div class="wordmark">Z-RUSH</div>
  <div class="prompt">the archive comes at you — every beat is a push, seen through bent glass</div>
  <div class="prompt">click to enter — sound on · m mute</div>
</div>

<script type="module">
import * as THREE from 'three';
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest } from '../../js/data.js';

const overlay = document.getElementById('overlay');
const clockEl = document.getElementById('clock');

const conductor = createConductor();
const music = createMusic(conductor);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

let VW = window.innerWidth, VH = window.innerHeight;
const camera = new THREE.PerspectiveCamera(60, VW / VH, 0.1, 120);
camera.position.z = 0;

// the void: warm charcoal with a soft radial lift behind the tunnel —
// dark imagery silhouettes against it instead of dissolving into black
const VOID = 0x232120;
const scene = new THREE.Scene();
scene.background = new THREE.Color(VOID);
scene.fog = new THREE.Fog(VOID, 24, 85);

function makeBackdrop() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(256, 256, 40, 256, 256, 360);
  grad.addColorStop(0, '#403b37');
  grad.addColorStop(0.55, '#2b2826');
  grad.addColorStop(1, '#191717');
  g.fillStyle = grad;
  g.fillRect(0, 0, 512, 512);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshBasicMaterial({ map: tex, fog: false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
  mesh.position.z = -100;
  mesh.scale.set(300, 300, 1);
  scene.add(mesh);
}
makeBackdrop();

let rt = new THREE.WebGLRenderTarget(VW * renderer.getPixelRatio(), VH * renderer.getPixelRatio());

// ── lens pass — the recovered Vincent Lowe fragment, beat-driven ──
const lensScene = new THREE.Scene();
const lensCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
lensCam.position.z = 1;
const lensMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform sampler2D tex1;
    uniform float textureScale;
    uniform float time;
    uniform float displacement;
    uniform float scrollDif;
    void main() {
      vec4 outColor1 = texture2D(tex1, vUv);
      float lum1 = (outColor1.r + outColor1.g + outColor1.b) / 3.0;
      vec2 cVuv = vUv - vec2(0.5);
      float outCircle = (0.5 - distance(cVuv, vec2(0.0))) * (textureScale * 10.0);
      vec2 nVuv = vUv - vec2(0.5);
      nVuv.xy *= 1.0 + 0.5 * displacement - (1.0 - outCircle) * displacement * 0.5;
      nVuv.y  *= 1.0 - sin(time * 0.001 + vUv.x * 10.1 + lum1 * 10.1) * scrollDif * 0.01;
      nVuv += vec2(0.5);
      gl_FragColor = texture2D(tex1, nVuv);
    }
  `,
  uniforms: {
    tex1: { value: rt.texture },
    textureScale: { value: 0.4 },
    time: { value: 0 },
    displacement: { value: 0.26 },
    scrollDif: { value: 0 },
  },
});
lensScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), lensMat));

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  camera.aspect = VW / VH;
  camera.updateProjectionMatrix();
  renderer.setSize(VW, VH);
  rt.setSize(VW * renderer.getPixelRatio(), VH * renderer.getPixelRatio());
}
window.addEventListener('resize', resize);
resize();

// ── the rushing archive ──
const PLANES = 12;
const SPACING = 6.5;
const loader = new THREE.TextureLoader();
let pool = [];
let queue = [];

function shuffled(list) {
  const a = [...list];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextUrl() {
  if (queue.length === 0) queue = shuffled(pool);
  return queue.pop();
}

function assignTexture(slide) {
  loader.load(nextUrl(), (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    const a = tex.image.width / tex.image.height;
    slide.mesh.scale.set(a >= 1 ? 4.2 * a : 4.2, a >= 1 ? 4.2 : 4.2 / a, 1);
    slide.mat.map = tex;
    slide.mat.needsUpdate = true;
  });
}

const slides = [];
function buildSlides() {
  for (let i = 0; i < PLANES; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: true, transparent: true });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
    // center-weighted: the work parades through the middle of the frame,
    // alternating gently off-axis so planes never fully eclipse each other
    const lane = i % 4;
    mesh.position.set(
      [-1.7, 1.7, -0.7, 0.7][lane] * (0.85 + Math.random() * 0.3),
      [0.6, -0.6, -1.1, 1.1][lane] * (0.6 + Math.random() * 0.5),
      -8 - i * SPACING
    );
    scene.add(mesh);
    const slide = { mesh, mat };
    slides.push(slide);
    assignTexture(slide);
  }
}

// ── motion: constant drift + a shove on every beat ──
let speed = 0;
let impulse = 0;
let lastT = 0;
let disp = 0.42;

// distortion choreography keyed to the frontmost image's journey:
// loud when a new image enters deep in the tunnel, settling to almost
// nothing at hero placement, building again as it closes on the camera
function dispTarget(zf) {
  if (zf <= -16) return 0.42;
  if (zf <= -8) return 0.42 + ((zf + 16) / 8) * (0.08 - 0.42);
  if (zf <= -6) return 0.08;
  return 0.08 + Math.min(1, (zf + 6) / 2.7) * (0.55 - 0.08);
}

function render(t) {
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;

  // glide-step: almost still between ticks, a clear push on each beat —
  // the motion IS the rhythm
  impulse *= Math.pow(0.1, dt);
  speed = 0.18 + impulse * 3.4;

  let zFront = -Infinity;
  for (const s of slides) {
    s.mesh.position.z += speed * dt;
    const z = s.mesh.position.z;
    // recycle BEFORE the plane outgrows the viewport — the work is always
    // fully visible; a short fade covers the exit
    s.mat.opacity = Math.min(1, Math.max(0, (z + 3.4) / -1.0));
    if (z > -3.3) {
      s.mesh.position.z -= PLANES * SPACING;
      assignTexture(s);
    } else if (z > zFront) {
      zFront = z;
    }
  }

  disp += (dispTarget(zFront) - disp) * Math.min(1, dt * 4);
  lensMat.uniforms.displacement.value = disp;
  lensMat.uniforms.time.value = t;
  lensMat.uniforms.scrollDif.value = impulse * 0.7;

  renderer.setRenderTarget(rt);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(lensScene, lensCam);

  requestAnimationFrame(render);
}

conductor.onBeat((beat) => {
  impulse = 1;
  music.onBeat(beat);
  clockEl.textContent = beat.date.toTimeString().slice(0, 8);
});

let entered = false;
const ready = Promise.all([music.load(), loadImageryManifest()]);

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  overlay.classList.add('leaving');
  await conductor.start();
  const [, manifest] = await ready;
  pool = manifest;
  music.begin();
  buildSlides();
  requestAnimationFrame(render);
  setTimeout(() => overlay.remove(), 600);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
