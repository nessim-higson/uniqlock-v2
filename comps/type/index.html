<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 03 — type performance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  #stage { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: var(--bg, #fff); transition: none; }
  #word {
    font-weight: 700; color: var(--fg, #000); line-height: 0.92;
    text-align: center; letter-spacing: var(--track, -0.02em);
    font-size: var(--size, 18vmin);
    transform: scale(var(--pop, 1));
    will-change: transform;
    white-space: nowrap;
  }
  #bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--fg, #000);
    width: 0; z-index: 5; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #clock { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="stage"><div id="word"></div></div>
<div id="bar"></div>
<div id="label">COMP 03 — TYPE PERFORMANCE · <a href="../">back</a></div>
<div id="clock"></div>
<div id="overlay">
  <div class="wordmark">TYPE PERFORMANCE</div>
  <div class="prompt">helvetica as the dancer — one word per beat, color turns on the bar</div>
  <div class="prompt">click to enter — sound on · m mute</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { HOUR_COLORS } from '../../js/data.js';

const stage = document.getElementById('stage');
const wordEl = document.getElementById('word');
const barEl = document.getElementById('bar');
const clockEl = document.getElementById('clock');
const overlay = document.getElementById('overlay');

const conductor = createConductor();
const music = createMusic(conductor);

// the libretto — one word per beat, loops forever
const WORDS = [
  'I', 'AM', 'ALWAYS', 'HUNGRY',
  'EVERY', 'SECOND', 'IS', 'A',
  'PERFORMANCE', '·', 'TICK', '·',
  'THE', 'CLOCK', 'NEVER', 'YIELDS',
];

// per-word character: size and tracking permute deterministically
const SIZES = ['26vmin', '14vmin', '21vmin', '32vmin'];
const TRACKS = ['-0.04em', '0.02em', '-0.02em', '0.12em'];

function hourColor(h) {
  const [r, g, b] = HOUR_COLORS[h];
  return `rgb(${r},${g},${b})`;
}

let pop = 1;

conductor.onBeat((beat) => {
  music.onBeat(beat);
  const n = beat.n;
  const word = WORDS[n % WORDS.length];
  const barPos = n % 4;
  const color = hourColor(beat.date.getHours());

  // color flips on the bar (every 4 beats): color-on-white ↔ white-on-color
  const inverted = Math.floor(n / 4) % 2 === 1;
  stage.style.setProperty('--bg', inverted ? color : '#fff');
  stage.style.setProperty('--fg', inverted ? '#fff' : color);

  wordEl.textContent = word;
  wordEl.style.setProperty('--size', SIZES[(n * 7 + 3) % SIZES.length]);
  wordEl.style.setProperty('--track', TRACKS[(n * 5 + 1) % TRACKS.length]);

  barEl.style.width = `${(barPos + 1) * 25}%`;
  pop = 1.06;

  clockEl.textContent = beat.date.toTimeString().slice(0, 8);
});

// the snap: instant attack on the beat, fast eased return
function render() {
  pop += (1 - pop) * 0.18;
  wordEl.style.setProperty('--pop', pop.toFixed(4));
  requestAnimationFrame(render);
}

let entered = false;
const musicReady = music.load();

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  overlay.classList.add('leaving');
  await conductor.start();
  requestAnimationFrame(render);
  setTimeout(() => overlay.remove(), 600);
  musicReady.then(() => music.begin()).catch((err) => {
    console.warn('[type] music failed, running silent:', err);
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
