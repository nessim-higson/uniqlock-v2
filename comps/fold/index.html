<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 18 — fold</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  #stage { position: absolute; inset: 0; perspective: 1600px; background: #000; }
  #current { position: absolute; inset: 0; overflow: hidden; background: #000; }
  .hinge { position: absolute; inset: 0; transform-style: preserve-3d; }
  .face { position: absolute; inset: 0; overflow: hidden; background: #000;
    backface-visibility: hidden; }
  .face img, .face video, #current img, #current video {
    width: 100%; height: 100%; object-fit: cover; display: block; }

  #clock { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 4; font-family: "Uniqlo", "Helvetica Neue", sans-serif; font-weight: 700;
    font-size: 6vmin; letter-spacing: 0.04em; color: #fff; mix-blend-mode: difference;
    font-variant-numeric: tabular-nums; }
  #metro { position: fixed; left: 3vmin; top: 3vmin; width: 4.75vmin; height: 4.75vmin;
    z-index: 6; background: #fff; display: none; align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-weight: 700; font-size: 1.25vmin; letter-spacing: 0.04em; color: #111; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em; font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; padding: 6vw; text-align: center; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 6vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 2.4vmin; opacity: 0.55; letter-spacing: 0.06em; line-height: 1.7; }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
</head>
<body>

<div id="stage"><div id="current"></div></div>
<div id="clock">00:00:00</div>
<div id="metro"><span>IAAH</span></div>
<div id="label">COMP 18 — FOLD · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">FOLD</div>
  <div class="prompt">each beat, the work folds away on a seam and the next folds up to take
  its place — the hinge edge cycling through all four sides, one at a time, into the black.
  the clock and the mark keep time.</div>
  <div class="prompt">m mute · tap to enter, sound on</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest } from '../../js/data.js';
import { getClip, playClip, pickClipIdx, warmClips } from '../../js/pieces.js';

window.CustomEase && window.gsap.registerPlugin(window.CustomEase);
window.CustomEase && window.CustomEase.create('pageTransition', 'M0,0 C0.38,0.05 0.48,0.58 0.65,0.82 0.82,1 1,1 1,1');
const gsap = window.gsap;

const stage = document.getElementById('stage');
const currentEl = document.getElementById('current');
const clockEl = document.getElementById('clock');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const conductor = createConductor();
const music = createMusic(conductor);

function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rng = mulberry32(0xf01d);

// the hinge cycles through all four seam edges, one at a time
const FOLDS = [
  { prop: 'rotationX', sign: 1, dim: 'h' },  // seam at bottom — old folds back/up
  { prop: 'rotationY', sign: 1, dim: 'w' },  // seam at left  — old folds back/right
  { prop: 'rotationX', sign: -1, dim: 'h' }, // seam at top   — old folds back/down
  { prop: 'rotationY', sign: -1, dim: 'w' }, // seam at right — old folds back/left
];
let foldIdx = 0;

let pool = [], queue = [];
const cache = new Map();
function img(url) { if (!cache.has(url)) { const im = new Image(); im.src = url; cache.set(url, im); } return cache.get(url); }
function nextStill() { if (!queue.length) { queue = [...pool]; for (let i = queue.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [queue[i], queue[j]] = [queue[j], queue[i]]; } } return queue.pop(); }

function freeVid(node) { if (node && node.tagName === 'VIDEO') { node.pause(); node.style.display = 'none'; document.body.appendChild(node); } }
function makeNode(makeVideo) {
  if (makeVideo) { const v = getClip(pickClipIdx(rng())); v.style.display = 'block'; playClip(v); return v; }
  return img(nextStill()).cloneNode();
}

let currentNode = null;
let lastBeat = -1;
let busy = false;

function fold(makeVideo) {
  const f = FOLDS[foldIdx % FOLDS.length];
  foldIdx++;
  const R = (f.dim === 'h' ? innerHeight : innerWidth) / 2;   // 90° hinge: faces meet at the seam
  const newNode = makeNode(makeVideo);

  const hinge = document.createElement('div');
  hinge.className = 'hinge';
  const outFace = document.createElement('div'); outFace.className = 'face';
  const inFace = document.createElement('div'); inFace.className = 'face';
  // the outgoing (live) work moves into the front face; the incoming sits folded at the seam
  outFace.appendChild(currentNode);
  inFace.appendChild(newNode);
  const rot = f.prop === 'rotationX' ? 'rotateX' : 'rotateY';
  outFace.style.transform = `${rot}(0deg) translateZ(${R}px)`;
  inFace.style.transform = `${rot}(${f.sign * 90}deg) translateZ(${R}px)`;
  hinge.append(outFace, inFace);
  stage.appendChild(hinge);

  gsap.set(hinge, { z: -R });
  gsap.set(hinge, { [f.prop]: 0 });
  busy = true;
  gsap.to(hinge, {
    [f.prop]: -f.sign * 90, duration: 0.7, ease: 'pageTransition', force3D: true,
    onComplete: () => {
      currentEl.appendChild(newNode);   // settle the new work flat
      const oldNode = outFace.firstChild;
      freeVid(oldNode);
      hinge.remove();
      currentNode = newNode;
      busy = false;
    },
  });
}

function beat(n) {
  lastBeat = n;
  if (busy) return;                     // don't start a fold over a running one
  fold(rng() < 0.2);
}

function render() {
  const phase = conductor.phase();
  const b = Math.floor(phase);
  if (b !== lastBeat) beat(b);
  clockEl.textContent = new Date(phase * 1000).toTimeString().slice(0, 8);
  requestAnimationFrame(render);
}

let metroDeg = 0;
conductor.onBeat((bt) => {
  music.onBeat(bt);
  if (Math.floor(conductor.phase()) !== lastBeat) beat(Math.floor(conductor.phase()));
  metroDeg += 90;
  metro.style.transform = `rotate(${metroDeg}deg)`;
  if (currentNode && currentNode.tagName === 'VIDEO' && currentNode.paused) currentNode.play().catch(() => {});
  statusEl.textContent = `FOLD · ${bt.date.toTimeString().slice(0, 8)}`;
});

let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    pool = await manifestReady;
    pool.forEach(img); warmClips(3);
    currentNode = makeNode(false);      // open on a still
    currentEl.appendChild(currentNode);
    lastBeat = Math.floor(conductor.phase());
    metro.style.display = 'flex';
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; const p = overlay.querySelector('.prompt'); if (p) p.textContent = 'failed: ' + err.message; }
});

document.addEventListener('keydown', (e) => { if (e.key === 'm' && entered) music.toggleMute(); });
</script>

</body>
</html>
