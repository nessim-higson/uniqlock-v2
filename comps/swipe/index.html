<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 12 — swipe</title>
<style>
  @font-face {
    font-family: "Uniqlo";
    src: url("https://megajerk.github.io/Uniqlock/assets/fonts/7_UniqloBold.woff") format("woff");
    font-weight: 700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  :root { --ease-out: cubic-bezier(.1, 1, .2, 1); }
  #stage { position: absolute; inset: 0; }
  .layer { position: absolute; inset: 0; }
  .layer img, .layer video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .layer.in-top    { animation: inTop 300ms forwards var(--ease-out); }
  .layer.in-right  { animation: inRight 300ms forwards var(--ease-out); }
  .layer.in-bottom { animation: inBottom 300ms forwards var(--ease-out); }
  .layer.in-left   { animation: inLeft 300ms forwards var(--ease-out); }
  @keyframes inTop    { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
  @keyframes inRight  { from { clip-path: inset(0 0 0 100%); } to { clip-path: inset(0); } }
  @keyframes inBottom { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0); } }
  @keyframes inLeft   { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }

  #clock { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 4; font-family: "Uniqlo", "Helvetica Neue", sans-serif; font-weight: 700;
    font-size: 6vmin; letter-spacing: 0.04em; color: #fff; mix-blend-mode: difference;
    font-variant-numeric: tabular-nums; }

  #metro { position: fixed; left: 26px; top: 26px; width: 6.4vmin; height: 6.4vmin;
    z-index: 6; background: #fff; display: flex; align-items: center; justify-content: center;
    transition: transform 220ms cubic-bezier(.3, 0, .15, 1); }
  #metro span { font-family: "Helvetica Neue", Helvetica, sans-serif; font-weight: 700;
    font-size: 1.7vmin; letter-spacing: 0.04em; color: #111; }

  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<div id="stage"></div>
<video id="v0" muted playsinline preload="auto" style="display:none"></video>
<video id="v1" muted playsinline preload="auto" style="display:none"></video>
<div id="metro" style="display:none"><span>IAAH</span></div>
<div id="clock">00:00:00</div>
<div id="label">COMP 12 — SWIPE · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">SWIPE</div>
  <div class="prompt">the original mechanic, turned on the archive: time small and centered,<br>
  a different work — still or clip — swiping in from a new direction on every beat.</div>
  <div class="prompt">m mute · click to enter, sound on</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { createMusic } from '../../js/music.js';
import { loadImageryManifest, VIDEOS, timeOfDay } from '../../js/data.js';

const stage = document.getElementById('stage');
const clockEl = document.getElementById('clock');
const metro = document.getElementById('metro');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const vids = [document.getElementById('v0'), document.getElementById('v1')];
const conductor = createConductor();
const music = createMusic(conductor);

let pool = [];
const cache = new Map();
function img(url) {
  if (!cache.has(url)) { const im = new Image(); im.src = url; cache.set(url, im); }
  return cache.get(url);
}
// deterministic + low-discrepancy: the golden-ratio sequence walks the pool
// so consecutive beats are always ~0.62 of the pool apart — it can never
// land on the same image twice in a row (which read as a "stall"), while
// staying a pure function of the beat serial (broadcast-identical).
const GOLDEN = 0.6180339887498949;
function urlFor(n) {
  const f = ((n * GOLDEN) % 1 + 1) % 1;
  return pool[Math.floor(f * pool.length)];
}

// ── clips: every 3rd beat is a dance clip, deterministic. Two pooled video
// elements alternate; the next clip beat is always known, so its clip is
// preloaded ~3 beats (3s) ahead and ready when its beat lands. ──
const CLIP_EVERY = 3;
const GOLD2 = 0.7548776662466927;
const isClipBeat = (n) => (((n % CLIP_EVERY) + CLIP_EVERY) % CLIP_EVERY) === 1;
function clipUrlFor(n) {
  const list = VIDEOS[timeOfDay(new Date(conductor.phase() * 1000).getHours())];
  const f = ((n * GOLD2) % 1 + 1) % 1;
  return list[Math.floor(f * list.length)];
}
let vStandby = 0;
const vBusy = [false, false];
function preloadClip(url) {
  const v = vids[vStandby];
  if (!vBusy[vStandby] && v.dataset.url !== url) { v.dataset.url = url; v.src = url; v.load(); }
}
function claimVideo() {
  const i = vStandby;
  if (vBusy[i] || vids[i].readyState < 2) return null;
  vBusy[i] = true;
  vStandby = 1 - vStandby;
  return vids[i];
}
function freeVideo(v) {
  const i = vids.indexOf(v);
  if (i < 0) return;
  v.pause();
  v.style.display = 'none';
  document.body.appendChild(v); // detach from the removed layer, keep for reuse
  vBusy[i] = false;
}
function nextClipBeat(n) { let k = n + 1; while (!isClipBeat(k)) k++; return k; }

const DIRS = ['top', 'right', 'bottom', 'left'];
let shownBeat = -1;
let layers = [];

function removeLayer(layer) {
  const v = layer.querySelector('video');
  if (v) freeVideo(v);
  layer.remove();
}

function showBeat(n) {
  shownBeat = n;
  const layer = document.createElement('div');
  layer.className = 'layer in-' + DIRS[((n % 4) + 4) % 4];

  let useVideo = null;
  if (isClipBeat(n)) useVideo = claimVideo(); // null if not ready → still fallback
  if (useVideo) {
    useVideo.style.display = 'block';
    useVideo.currentTime = 0;
    useVideo.play().catch(() => {});
    layer.appendChild(useVideo);
  } else {
    layer.appendChild(img(urlFor(n)).cloneNode());
  }
  stage.appendChild(layer);
  layers.push(layer);
  while (layers.length > 2) removeLayer(layers.shift());

  // queue the next clip onto the standby element, well ahead of its beat
  preloadClip(clipUrlFor(nextClipBeat(n)));
}

function render() {
  const n = Math.floor(conductor.phase());
  if (n !== shownBeat) showBeat(n);
  const d = new Date(conductor.phase() * 1000);
  clockEl.textContent = d.toTimeString().slice(0, 8);
  requestAnimationFrame(render);
}

let metroDeg = 0;
conductor.onBeat((beat) => {
  music.onBeat(beat);
  const n = Math.floor(conductor.phase());
  if (n !== shownBeat) showBeat(n); // occlusion-proof
  // warm the next few
  for (let i = 1; i <= 3; i++) img(urlFor(n + i));
  // the twisting IAAH mark — quarter-turn on every beat, the visible metronome
  metroDeg += 90;
  metro.style.transform = `rotate(${metroDeg}deg)`;
  statusEl.textContent = `EVERY BEAT · SWIPE ${DIRS[((n % 4)+4)%4].toUpperCase()} · ${beat.date.toTimeString().slice(0, 8)}`;
});

let entered = false;
const manifestReady = loadImageryManifest();
const musicReady = music.load();
overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  try {
    await conductor.start();
    pool = await manifestReady;
    // preload the entire pool up front (40 images) so no beat ever waits
    // on a decode — the other source of the "weird delay"
    pool.forEach(img);
    preloadClip(clipUrlFor(nextClipBeat(Math.floor(conductor.phase()))));
    metro.style.display = 'flex';
    overlay.classList.add('leaving');
    setTimeout(() => overlay.remove(), 600);
    requestAnimationFrame(render);
    musicReady.then(() => music.begin()).catch(() => {});
  } catch (err) { console.error(err); entered = false; }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' && entered) music.toggleMute();
});
</script>

</body>
</html>
