<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP 04 — hands</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "Helvetica Neue", Helvetica, sans-serif; }
  canvas#c { position: absolute; inset: 0; width: 100%; height: 100%; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin;
    background: #000; color: #fff; cursor: pointer; transition: opacity 500ms ease; }
  #overlay.leaving { opacity: 0; pointer-events: none; }
  #overlay .wordmark { font-size: 4.4vmin; font-weight: 700; letter-spacing: 0.18em; }
  #overlay .prompt { font-size: 1.8vmin; opacity: 0.55; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #label { position: fixed; left: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.14em; }
  #label a { color: inherit; }
  #status { position: fixed; right: 18px; bottom: 16px; z-index: 5; color: #fff;
    mix-blend-mode: difference; font-size: 11px; letter-spacing: 0.18em;
    font-variant-numeric: tabular-nums; text-align: right; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="label">COMP 04 — HANDS · <a href="../">back</a></div>
<div id="status"></div>
<div id="overlay">
  <div class="wordmark">HANDS</div>
  <div class="prompt">an analog clock made of the archive — the second hand reveals images,<br>
  the minute hand changes the project, the hour hand sets the color</div>
  <div class="prompt">1 / 2 / 3 — tempo (sit with the work longer, or see it faster) · m mute</div>
  <div class="prompt">click to enter — sound on (generative, conductor-owned)</div>
</div>

<script type="module">
import { createConductor } from '../../js/conductor.js';
import { HOUR_COLORS, loadImageryManifest } from '../../js/data.js';

const canvas = document.getElementById('c');
const x = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');

const conductor = createConductor();
const { ctx } = conductor;

// ── tempo: viewing cadence, never timekeeping. The second is sacred;
//    the dial changes how much of a revolution one image owns. ──
const TEMPI = {
  1: { wedge: 60, name: 'SLOW — one image per minute' },
  2: { wedge: 15, name: 'MEDIUM — quarters' },
  3: { wedge: 5,  name: 'FAST — twelve per minute' },
};
let tempo = 2;

// ── canvas ──
let W, H, DPR, baked;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  x.setTransform(DPR, 0, 0, DPR, 0, 0);
  baked = document.createElement('canvas');
  baked.width = W * DPR; baked.height = H * DPR;
  const bx = baked.getContext('2d');
  bx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (liveImg) { drawCover(bx, liveImg); }
}

function drawCover(g, img) {
  const s = Math.max(W / img.width, H / img.height);
  g.drawImage(img, (W - img.width * s) / 2, (H - img.height * s) / 2, img.width * s, img.height * s);
}

// ── the archive as taxonomy: minute hand owns the SET (project),
//    second hand owns the IMAGE within it ──
let sets = [];          // 4 groups of 10 from the manifest
let setIndex = 0;
let queue = [];
let liveImg = null;

function shuffled(list) {
  const a = [...list];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadImage(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}

function advanceSet() {
  setIndex = (setIndex + 1) % sets.length;
  queue = shuffled(sets[setIndex]);
}

async function nextImage() {
  if (queue.length === 0) queue = shuffled(sets[setIndex]);
  return loadImage(queue.pop());
}

// ── generative soundtrack: calm, clean, conductor-owned.
//    pad drone + breath-quiet tick each second + a tock on each image
//    boundary + a low gong on the minute. All sample-accurate. ──
const master = ctx.createGain();
master.gain.value = 1;
master.connect(ctx.destination);
let muted = false;

// pad chords — one per minute, slow-glide retune (Am, F, C, G ambient set)
const CHORDS = [
  [110.00, 164.81, 220.60],
  [87.31, 130.81, 174.61],
  [130.81, 196.00, 261.63],
  [98.00, 146.83, 196.00],
];
const padOscs = [];

function startPad() {
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 520;
  const padGain = ctx.createGain();
  padGain.gain.value = 0.028;
  lp.connect(padGain); padGain.connect(master);
  [[110, 0.5], [164.81, 0.35], [220.6, 0.2]].forEach(([f, g]) => {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const og = ctx.createGain(); og.gain.value = g;
    o.connect(og); og.connect(lp); o.start();
    padOscs.push(o);
  });
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 1 / 16;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.014;
  lfo.connect(lfoGain); lfoGain.connect(padGain.gain); lfo.start();
}

function setChordAt(when, minute) {
  const chord = CHORDS[minute % CHORDS.length];
  padOscs.forEach((o, i) => o.frequency.setTargetAtTime(chord[i], when, 0.8));
}

// quiet pentatonic pluck on odd seconds — deterministic melody, the
// "alive" layer over the drone
const PENTA = [220, 261.63, 293.66, 329.63, 392, 440];
function pluckAt(when, sec, minute) {
  const o = ctx.createOscillator();
  o.type = 'triangle';
  o.frequency.value = PENTA[(sec * 7 + minute * 3) % PENTA.length];
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.032, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.5);
  o.connect(g); g.connect(master);
  o.start(when); o.stop(when + 0.55);
}

let noiseBuf = null;
function makeNoise() {
  noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}

function tickAt(when) {
  const src = ctx.createBufferSource();
  src.buffer = noiseBuf;
  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 6500;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.02, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.025);
  src.connect(hp); hp.connect(g); g.connect(master);
  src.start(when);
}

let tockFlip = false;
function tockAt(when) {
  tockFlip = !tockFlip;
  const o = ctx.createOscillator();
  o.type = 'sine'; o.frequency.value = tockFlip ? 392 : 329.63;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.06, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.3);
  o.connect(g); g.connect(master);
  o.start(when); o.stop(when + 0.35);
}

function gongAt(when) {
  [[98, 0.1, 2.0], [196, 0.04, 1.2]].forEach(([f, amp, dur]) => {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(amp, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g); g.connect(master);
    o.start(when); o.stop(when + dur + 0.1);
  });
}

// ── geometry ──
const angleOf = (units, total) => (units / total) * Math.PI * 2 - Math.PI / 2;

function sector(g, a0, a1, R) {
  g.beginPath();
  g.moveTo(W / 2, H / 2);
  g.arc(W / 2, H / 2, R, a0, a1, false);
  g.closePath();
}

// ── wedge engine ──
let wedgeStart = 0;       // seconds-into-minute where the live wedge began
let pendingBake = null;   // image waiting to be committed
let lastWedgeIndex = -1;  // absolute wedge counter (wallSec / wedge)

function wedgeSec() { return TEMPI[tempo].wedge; }

async function rotateWedge(newStart) {
  if (liveImg) pendingBake = { img: liveImg, a0: angleOf(wedgeStart, 60), a1: angleOf(newStart === 0 ? 60 : newStart, 60) };
  wedgeStart = newStart;
  liveImg = await nextImage();
}

function hand(angle, len, w, alpha = 1) {
  x.save();
  x.translate(W / 2, H / 2);
  x.rotate(angle);
  x.globalCompositeOperation = 'difference';
  x.globalAlpha = alpha;
  x.fillStyle = '#fff';
  x.fillRect(0, -w / 2, len, w);
  x.restore();
}

function drawFrame() {
  const phase = conductor.phase();
  const date = new Date(phase * 1000);
  const intoMinute = ((phase % 60) + 60) % 60;
  const sec = Math.floor(intoMinute);
  const frac = intoMinute - sec;
  const snap = 1 - Math.pow(1 - Math.min(frac / 0.15, 1), 3);
  const steppedSec = sec + snap;
  const R = Math.hypot(W, H);

  // commit a finished wedge into the baked layer
  if (pendingBake) {
    const bx = baked.getContext('2d');
    bx.save();
    bx.beginPath();
    bx.moveTo(W / 2, H / 2);
    bx.arc(W / 2, H / 2, R, pendingBake.a0, pendingBake.a1, false);
    bx.closePath();
    bx.clip();
    drawCover(bx, pendingBake.img);
    bx.restore();
    pendingBake = null;
  }

  // hour wash behind everything
  const [r, g, b] = HOUR_COLORS[date.getHours()];
  x.fillStyle = `rgb(${r * 0.12 | 0},${g * 0.12 | 0},${b * 0.12 | 0})`;
  x.fillRect(0, 0, W, H);

  x.drawImage(baked, 0, 0, W, H);

  // live wedge: incoming image revealed up to the stepped hand
  if (liveImg) {
    x.save();
    sector(x, angleOf(wedgeStart, 60), angleOf(steppedSec, 60), R);
    x.clip();
    drawCover(x, liveImg);
    x.restore();
  }

  // hour-color arc at the rim, 12 o'clock to the hour hand
  const hourPos = (date.getHours() % 12) + date.getMinutes() / 60;
  const Rrim = Math.min(W, H) * 0.47;
  x.save();
  x.strokeStyle = `rgb(${r},${g},${b})`;
  x.lineWidth = 3;
  x.beginPath();
  x.arc(W / 2, H / 2, Rrim, -Math.PI / 2, angleOf(hourPos, 12), false);
  x.stroke();
  x.restore();

  // the three hands — hour and minute solid, second full-bleed
  hand(angleOf(hourPos, 12), Math.min(W, H) * 0.21, 7);
  hand(angleOf(date.getMinutes() + sec / 60, 60), Math.min(W, H) * 0.34, 4);
  hand(angleOf(steppedSec, 60), R, 1.5);

  // center pivot
  x.save();
  x.globalCompositeOperation = 'difference';
  x.fillStyle = '#fff';
  x.beginPath(); x.arc(W / 2, H / 2, 5, 0, Math.PI * 2); x.fill();
  x.restore();
}

function render() {
  drawFrame();
  requestAnimationFrame(render);
}

// ── beat wiring ──
conductor.onBeat((beat) => {
  const s = beat.date.getSeconds();
  const when = conductor.audioTimeForWallSec(beat.wallSec + 1);
  const nextS = (s + 1) % 60;
  tickAt(when);
  if (nextS % wedgeSec() === 0) tockAt(when);
  if (nextS % 2 === 1) pluckAt(when, nextS, beat.date.getMinutes());
  if (nextS === 0) {
    gongAt(when);
    setChordAt(when, beat.date.getMinutes() + 1);
  }

  // advance the set first so a new minute's first wedge draws from it
  if (s === 0) advanceSet();
  // wedge identity by absolute index — rotates exactly once per boundary,
  // works at every tempo including the full-minute wedge
  const idx = Math.floor(beat.wallSec / wedgeSec());
  if (lastWedgeIndex === -1) lastWedgeIndex = idx;
  else if (idx !== lastWedgeIndex) {
    lastWedgeIndex = idx;
    rotateWedge(s);
  }

  statusEl.textContent = `${TEMPI[tempo].name} · SET ${String(setIndex + 1).padStart(2, '0')}\n${beat.date.toTimeString().slice(0, 8)}`;

  // rAF freezes in hidden tabs; keep the face current off the beat so
  // returning to the tab never shows a stale or blank clock.
  if (document.hidden && entered) drawFrame();
});

// ── entry ──
let entered = false;
const ready = loadImageryManifest();

overlay.addEventListener('click', async () => {
  if (entered) return;
  entered = true;
  overlay.classList.add('leaving');
  await conductor.start();
  makeNoise();
  startPad();
  const manifest = await ready;
  const per = Math.ceil(manifest.length / 4);
  sets = [0, 1, 2, 3].map((i) => manifest.slice(i * per, (i + 1) * per)).filter((s) => s.length);
  queue = shuffled(sets[0]);
  liveImg = await nextImage();
  wedgeStart = Math.floor((conductor.phase() % 60) / wedgeSec()) * wedgeSec();
  resize();
  requestAnimationFrame(render);
  setTimeout(() => overlay.remove(), 600);
});

window.addEventListener('resize', () => { if (entered) resize(); });

document.addEventListener('keydown', (e) => {
  if (!entered) return;
  if (e.key === 'm') {
    muted = !muted;
    master.gain.setValueAtTime(muted ? 0 : 1, ctx.currentTime);
  }
  if (TEMPI[e.key]) tempo = Number(e.key);
});
</script>

</body>
</html>
